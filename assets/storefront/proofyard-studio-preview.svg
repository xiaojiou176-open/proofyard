  <text x="292" y="312" fill="#DDD6FE" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="700">INSPECT REPORTS</text>
  <text x="478" y="312" fill="#93C5FD" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="700">RECOVER FAILURES</text>
