  - name: VONAGE_MESSAGE_ID_TTL_SECONDS
    section: vonage
    default: 86400
    required: false
    sensitive: false
    description: Message-id dedupe TTL.
  - name: OTP_DEDUPE_REDIS_PREFIX
    section: vonage
    default: otp:vonage:dedupe
    required: false
    sensitive: false
    description: Redis key prefix for Vonage OTP dedupe.
  - name: OTP_DEDUPE_STRICT
    section: vonage
    default: false
    required: false
    sensitive: false
    description: Fail closed when dedupe storage is unavailable.
  - name: VONAGE_API_KEY
    section: vonage
    default: ""
    required: false
    sensitive: true
    description: Vonage API key for health checks.
  - name: VONAGE_API_SECRET
    section: vonage
    default: ""
    required: false
    sensitive: true
    description: Vonage API secret for health checks.
  - name: VONAGE_MIN_BALANCE
    section: vonage
    default: 1
    required: false
    sensitive: false
    description: Minimum expected account balance.
  - name: VONAGE_POOL_NUMBERS
    section: vonage
    default: ""
    required: false
    sensitive: false
    description: Optional comma-separated required number pool.

  - name: UIQ_MCP_API_BASE_URL
    section: mcp
    default: http://127.0.0.1:18080
    required: false
    sensitive: false
