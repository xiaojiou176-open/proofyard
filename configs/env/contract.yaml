  - name: UIQ_MCP_GOVERN_SESSION_BUDGET_MS
    section: mcp
    default: 120000
    required: false
    sensitive: false
    description: Session-wide governed-tool timeout budget.
  - name: UIQ_MCP_PERFECT_MODE
    section: mcp
    default: true
    required: false
    sensitive: false
    description: Enable perfect-mode MCP guardrails and strict defaults.
  - name: UIQ_MCP_TOOL_GROUPS
    section: mcp
    default: advanced,register,proof,analysis
    required: false
    sensitive: false
    description: Optional MCP tool groups to expose; use comma-separated groups or all.
  - name: UIQ_MCP_BACKEND_PORT
    section: mcp
    default: 18080
    required: false
    sensitive: false
    description: Preferred backend port for MCP-managed runtime.
  - name: UIQ_MCP_DEV_RUNTIME_ROOT
    section: mcp
    default: ""
    required: false
    sensitive: false
    description: Optional runtime directory for MCP local backend.
  - name: UIQ_MCP_FAKE_UIQ_BIN
    section: mcp
    default: ""
    required: false
    sensitive: false
    description: Override path to fake uiq binary in tests.
  - name: UIQ_MCP_STRESS_PARALLEL
    section: mcp
    default: 2
    required: false
    sensitive: false
    description: Parallel workers for MCP stress gate in CI workflows.
  - name: UIQ_MCP_AUDIT_MAX_BYTES
    section: mcp
