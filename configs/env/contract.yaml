  - name: UIQ_MCP_ALLOW_REMOTE_TOKEN_FORWARDING
    section: mcp
    default: false
    required: false
    sensitive: false
    description: Allow forwarding token to approved remote hosts.
  - name: UIQ_MCP_REMOTE_TOKEN_HOST_ALLOWLIST
    section: mcp
    default: ""
    required: false
    sensitive: false
    description: Comma-separated host allowlist for remote token forwarding.
  - name: UIQ_MCP_API_TIMEOUT_MS
    section: mcp
    default: 30000
    required: false
    sensitive: false
    description: MCP API request timeout budget.
  - name: UIQ_MCP_API_RETRY_MAX_ATTEMPTS
    section: mcp
    default: 6
    required: false
    sensitive: false
    description: Max attempts for retrying transient MCP API network errors.
  - name: UIQ_MCP_API_RETRY_BASE_DELAY_MS
    section: mcp
    default: 100
    required: false
    sensitive: false
    description: Base retry delay in milliseconds for transient MCP API network errors.
  - name: UIQ_MCP_HEALTH_TIMEOUT_MS
    section: mcp
    default: 2000
    required: false
    sensitive: false
    description: MCP health-check timeout budget.
  - name: UIQ_MCP_WORKSPACE_ROOT
    section: mcp
    default: .
    required: false
    sensitive: false
    description: MCP default workspace root.
  - name: UIQ_MCP_WORKSPACE_ALLOWLIST
    section: mcp
    default: ""
