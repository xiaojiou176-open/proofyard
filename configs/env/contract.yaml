version: 1
description: Canonical env-variable contract for this repository.
limits:
  max_variable_count: 350
allow_undeclared_exact:
  - ABORT_COMMAND
  - CI
  - GITHUB_ACTIONS
  - GITHUB_BASE_REF
  - GITHUB_EVENT_NAME
  - GITHUB_REF
  - GITHUB_REPOSITORY
  - GITHUB_STEP_SUMMARY
  - HOME
  - LANG
  - LAST_RUN_AT
  - LC_ALL
  - LINE_LIMIT
  - MAX_BEHIND
  - PATH
  - PYTEST_XDIST_WORKER
  - ROOT_DIR
  - SCOPE
  - STARTED_AT
  - STATE_PATH
  - STATUS
  - STRATEGY
  - SYNC_BRANCH_DATE
  - TERM
allow_undeclared_prefixes:
  - AI_REVIEW_
  - AUTOMATION_GLOBAL_
  - AUTOMATION_RUNTIME_
  - GEMINI_
  - GOOGLE_
  - npm_
  - PNPM_
  - PLAYWRIGHT_
  - RECON_
  - TM_
  - UIQ_
  - VITE_
variables:
  - name: APP_ENV
    section: core
    default: development
    required: false
    sensitive: false
    description: Runtime environment name.
  - name: NODE_ENV
    section: core
    default: development
    required: false
    sensitive: false
    description: Node.js runtime environment name for frontend, MCP, and orchestrator helpers.
  - name: LOG_LEVEL
    section: core
    default: DEBUG
    required: false
    sensitive: false
    description: Backend log level.
  - name: LOG_MAX_BYTES
    section: core
    default: 5242880
    required: false
    sensitive: false
    description: Per-log-file max size in bytes.
  - name: LOG_BACKUP_COUNT
    section: core
    default: 5
    required: false
    sensitive: false
    description: Number of rotated log files.
  - name: CORS_ALLOWED_ORIGINS
    section: core
    default: http://127.0.0.1:17373,http://localhost:17373
    required: false
    sensitive: false
    description: Comma-separated CORS origin allowlist.
  - name: TRUSTED_HOSTS
    section: core
    default: 127.0.0.1,localhost,testserver
    required: false
    sensitive: false
    description: Comma-separated trusted host allowlist.
  - name: COOKIE_SECURE
    section: core
    default: true
    required: false
    sensitive: false
    description: Set secure cookie policy.
  - name: CSRF_TTL_SECONDS
    section: core
    default: 900
    required: false
    sensitive: false
    description: CSRF token TTL in seconds.
  - name: FRONTEND_REGISTER_URL
    section: core
    default: ""
    required: false
    sensitive: false
    description: Optional frontend register URL override.

  - name: AUTOMATION_API_TOKEN
    section: auth
    default: replace-with-strong-token
    required: true
    sensitive: true
    description: Shared API token used by automation endpoints; placeholders and weak values are rejected fail-fast (min length 16).
  - name: AUTOMATION_REQUIRE_TOKEN
    section: auth
    default: true
    required: false
    sensitive: false
    description: Enforce token requirement for automation APIs.
  - name: AUTOMATION_ALLOW_LOCAL_NO_TOKEN
    section: auth
    default: false
    required: false
    sensitive: false
    description: Allow loopback no-token access only when APP_ENV is development or test; must remain false in production.

  - name: AUTOMATION_RATE_LIMIT_PER_MINUTE
    section: limits
    default: 120
    required: false
    sensitive: false
    description: Per-route per-client rate limit.
  - name: AUTOMATION_MAX_RATE_BUCKETS
    section: limits
    default: 2000
    required: false
    sensitive: false
    description: In-memory rate-limit bucket cap.
  - name: AUTOMATION_FAILURE_ALERT_THRESHOLD
    section: limits
    default: 0.2
    required: false
    sensitive: false
    description: Failure ratio threshold for alert state.
  - name: AUTOMATION_MAX_TASKS
    section: limits
    default: 300
    required: false
    sensitive: false
    description: Max queued/runnable tasks retained.
  - name: AUTOMATION_MAX_PARALLEL
    section: limits
    default: 8
    required: false
    sensitive: false
    description: Max concurrent automation tasks.
  - name: AUTOMATION_MAX_PARALLEL_LONG
    section: limits
    default: 1
    required: false
    sensitive: false
    description: Max concurrent long-running tasks.
  - name: AUTOMATION_DEFAULT_RETRIES
    section: limits
    default: 1
    required: false
    sensitive: false
    description: Default retry count for failed tasks.
  - name: AUTOMATION_RETRY_BASE_SECONDS
    section: limits
    default: "1.0"
    required: false
    sensitive: false
    description: Base delay in seconds for retry backoff.
  - name: AUTOMATION_RETRY_MAX_SECONDS
    section: limits
    default: "30.0"
    required: false
    sensitive: false
    description: Maximum retry delay in seconds after backoff.
  - name: AUTOMATION_RETRY_JITTER_RATIO
    section: limits
    default: 0.2
    required: false
    sensitive: false
    description: Random jitter ratio applied to retry backoff delays.
  - name: AUTOMATION_COMMAND_TIMEOUT_SECONDS
    section: limits
    default: 1800
    required: false
    sensitive: false
    description: Command timeout in seconds.
  - name: AUTOMATION_COMPLETED_TASK_TTL_SECONDS
    section: limits
    default: 86400
    required: false
    sensitive: false
    description: TTL in seconds for completed task records.
  - name: AUTOMATION_IDEMPOTENCY_TTL_SECONDS
    section: limits
    default: 21600
    required: false
    sensitive: false
    description: TTL in seconds for idempotency replay records.
  - name: AUTOMATION_RETENTION_HOURS
    section: limits
    default: 24
    required: false
    sensitive: false
    description: Retention window for automation artifacts in hours.
  - name: RUNTIME_GC_RETENTION_DAYS
    section: limits
    default: 7
    required: false
    sensitive: false
    description: Runtime garbage-collection retention window in days.
  - name: CACHE_MAX_ENTRIES
    section: limits
    default: 2000
    required: false
    sensitive: false
    description: Maximum in-memory cache entries.
  - name: CACHE_TTL_SECONDS
    section: limits
    default: 3600
    required: false
    sensitive: false
    description: Cache entry TTL in seconds.

  - name: UIQ_AUTO_TICKETING
    section: limits
    default: false
    required: false
    sensitive: false
    description: Enable CI auto-ticketing integration for failure clusters.
  - name: UIQ_GEMINI_LIVE_SMOKE_REQUIRED
    section: limits
    default: false
    required: false
    sensitive: false
    description: Require Gemini live smoke gate with real browser verification; when true, UIQ_BASE_URL must be external (non-loopback) and GEMINI_API_KEY must be available.
  - name: UIQ_GEMINI_LIVE_SMOKE_TIMEOUT_MS
    section: limits
    default: 15000
    required: false
    sensitive: false
    description: Timeout budget in milliseconds for the live Gemini smoke request.
  - name: UIQ_MCP_STRESS_TIME_BUDGET_MS
    section: limits
    default: 300000
    required: false
    sensitive: false
    description: CI time-budget threshold in milliseconds for MCP stress gate runs.

  - name: DATABASE_URL
    section: storage
    default: postgresql+psycopg://automation:automation@postgres:5432/automation
    required: false
    sensitive: true
    description: SQL persistence backend URL.
  - name: REDIS_URL
    section: storage
    default: redis://redis:6379/0
    required: false
    sensitive: true
    description: Redis backend URL for shared rate limiting.
  - name: UNIVERSAL_AUTOMATION_RUNTIME_DIR
    section: storage
    default: ""
    required: false
    sensitive: false
    description: Override universal runtime directory.
  - name: UNIVERSAL_PLATFORM_DATA_DIR
    section: storage
    default: ""
    required: false
    sensitive: false
    description: Override universal platform data directory.
  - name: PROJECT_PYTHON_ENV
    section: storage
    default: .runtime-cache/toolchains/python/.venv
    required: false
    sensitive: false
    description: Managed local Python project environment root used by repo-owned entrypoints.
  - name: UV_PROJECT_ENVIRONMENT
    section: storage
    default: .runtime-cache/toolchains/python/.venv
    required: false
    sensitive: false
    description: uv project environment override used to place the Python runtime under the repo-managed toolchains bucket.

  - name: RUM_SUMMARY_PATH
    section: observability
    default: .runtime-cache/metrics/rum-summary.json
    required: false
    sensitive: false
    description: RUM summary file path.
  - name: TRACING_ENABLED
    section: observability
    default: false
    required: false
    sensitive: false
    description: Enable OpenTelemetry tracing.
  - name: TRACING_EXPORTER
    section: observability
    default: console
    required: false
    sensitive: false
    description: "Tracing exporter: console or otlp."
  - name: TRACING_SERVICE_NAME
    section: observability
    default: uiq-backend
    required: false
    sensitive: false
    description: Service name tag for tracing.
  - name: TRACING_OTLP_ENDPOINT
    section: observability
    default: ""
    required: false
    sensitive: false
    description: OTLP endpoint URL when exporter=otlp.
  - name: TRACING_OTLP_HEADERS
    section: observability
    default: ""
    required: false
    sensitive: true
    description: Optional OTLP headers string.

  - name: FLOW_OTP_PROVIDER
    section: otp
    default: gmail
    required: false
    sensitive: false
    description: OTP provider strategy.
  - name: FLOW_OTP_REGEX
    section: otp
    default: '\b(\d{6})\b'
    required: false
    sensitive: false
    description: OTP regex capture pattern.
  - name: FLOW_OTP_SENDER_FILTER
    section: otp
    default: ""
    required: false
    sensitive: false
    description: Optional sender filter.
  - name: FLOW_OTP_SUBJECT_FILTER
    section: otp
    default: ""
    required: false
    sensitive: false
    description: Optional subject filter.
  - name: FLOW_OTP_TIMEOUT_SECONDS
    section: otp
    default: 240
    required: false
    sensitive: false
    description: OTP polling timeout in seconds.
  - name: FLOW_OTP_POLL_INTERVAL_SECONDS
    section: otp
    default: 5
    required: false
    sensitive: false
    description: OTP polling interval in seconds.
  - name: GMAIL_IMAP_USER
    section: otp
    default: ""
    required: false
    sensitive: true
    description: Gmail IMAP username.
  - name: GMAIL_IMAP_PASSWORD
    section: otp
    default: ""
    required: false
    sensitive: true
    description: Gmail IMAP app password.
  - name: IMAP_HOST
    section: otp
    default: ""
    required: false
    sensitive: false
    description: Generic IMAP host.
  - name: IMAP_USER
    section: otp
    default: ""
    required: false
    sensitive: true
    description: Generic IMAP username.
  - name: IMAP_PASSWORD
    section: otp
    default: ""
    required: false
    sensitive: true
    description: Generic IMAP password.

  - name: VONAGE_INBOUND_TOKEN
    section: vonage
    default: ""
    required: false
    sensitive: true
    description: Vonage inbound webhook token.
  - name: VONAGE_OTP_TO_NUMBER
    section: vonage
    default: ""
    required: false
    sensitive: false
    description: Allowed recipient number for OTP pickup.
  - name: VONAGE_SIGNATURE_SECRET
    section: vonage
    default: ""
    required: false
    sensitive: true
    description: Vonage callback signature secret.
  - name: VONAGE_SIGNATURE_ALGO
    section: vonage
    default: sha256
    required: false
    sensitive: false
