title = "UIQ gitleaks config (full-stack template, conservative defaults)"

[extend]
useDefault = true

[allowlist]
description = "Allow common generated/build artifacts and local runtime outputs"
paths = [
  '''^\.runtime-cache/''',
  '''^\.codex/''',
  '''(^|/)docs/''',
  '''(^|/)artifacts/''',
  '''(^|/)(pnpm-lock\.yaml|package-lock\.json|yarn\.lock|uv\.lock)$''',
  '''^playwright/\.cache/''',
  '''^coverage/''',
  '''^dist/''',
  '''^build/'''
]
