name: pr
steps:
  - unit
  - contract
  - ct
  - e2e
  - capture
  - a11y
  - perf
  - visual
  - report
tests:
  e2eSuite: smoke
gates:
  consoleErrorMax: 0
  pageErrorMax: 0
  http5xxMax: 0
  flakeRateMax: 0.02
  contractStatus: passed
  a11ySeriousMax: 0
  perfLcpMsMax: 4000
  perfFcpMsMax: 2500
  visualDiffPixelsMax: 0
determinism:
  timezone: UTC
  locale: en-US
  seed: 20260218
  disableAnimations: true
  reducedMotion: reduce
diagnostics:
  maxItems: 10
perf:
  preset: mobile
  engine: lhci
a11y:
  standard: wcag2aa
  maxIssues: 300
  engine: axe
visual:
  engine: builtin
  mode: diff
aiReview:
  enabled: false
  maxArtifacts: 40
  emitIssue: false
  emitPrComment: false
  severityThreshold: high
geminiAccuracyMin: 0.65
geminiParallelConsistencyMin: 0.6
geminiSampleSizeMin: 3
enginePolicy:
  required: []
  failOnBlocked: true
