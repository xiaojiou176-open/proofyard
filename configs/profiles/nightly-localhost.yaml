name: nightly-localhost
steps:
  - e2e
  - capture
  - explore
  - chaos
  - a11y
  - perf
  - visual
  - report
tests:
  e2eSuite: generic
gates:
  consoleErrorMax: 0
  pageErrorMax: 0
  http5xxMax: 0
  a11ySeriousMax: 0
  perfLcpMsMax: 5000
  perfFcpMsMax: 3000
  visualDiffPixelsMax: 0
explore:
  budgetSeconds: 300
  maxDepth: 4
  maxStates: 40
  seed: 424242
chaos:
  seed: 424242
  budgetSeconds: 210
  eventRatio:
    click: 28
    input: 24
    scroll: 30
    keyboard: 18
determinism:
  timezone: UTC
  locale: en-US
  seed: 424242
  disableAnimations: true
  reducedMotion: reduce
diagnostics:
  maxItems: 20
perf:
  preset: mobile
  engine: lhci
a11y:
  standard: wcag2aa
  maxIssues: 400
  engine: axe
visual:
  mode: diff
