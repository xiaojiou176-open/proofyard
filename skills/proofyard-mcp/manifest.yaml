name: webaudit-mcp
version: 0.1.1
description: Portable public skill packet for Webaudit's governed stdio MCP browser-evidence surface.
protocol: stdio
transport: stdio
auth: local-with-optional-backend-token
entrypoint: SKILL.md
package_shape: skill-folder
registry_targets:
  clawhub:
    status: listed-live
    package_shape: skill-folder
    listing_url: https://clawhub.ai/skills/webaudit-mcp
    note: Fresh 2026-04-08 America/Los_Angeles read-back confirmed this live ClawHub discovery page for the repo-owned skill folder.
    submit_via: clawhub publish . --slug webaudit-mcp --name "Webaudit MCP Skill" --version 0.1.1 --tags browser-evidence,mcp,recovery,webaudit
  goose-skills-marketplace:
    status: review-pending
    package_shape: skill-folder
    submission_url: https://github.com/block/agent-skills/pull/26
    note: Fresh 2026-04-12 read-back confirms the standalone webaudit-mcp skill is now in upstream review at block/Agent-Skills.
  agent-skill-index:
    status: review-pending
    package_shape: index-entry
    submission_url: https://github.com/heilcheng/awesome-agent-skills/pull/182
    note: Fresh 2026-04-12 read-back confirms the webaudit-mcp context-engineering entry is now in upstream review.
  openhands-extensions:
    status: closed-not-accepted
    package_shape: skill-folder
    submission_url: https://github.com/OpenHands/extensions/pull/161
    note: Fresh 2026-04-12 read-back confirms PR #161 was closed with maintainer guidance to distribute a custom marketplace.json instead of expecting an upstream listing.
    submit_via: submit this folder as skills/webaudit-mcp/ in OpenHands/extensions
surfaces:
  - repo-native MCP package
  - repo-owned install skill
  - ClawHub live discovery page
  - publish-ready Docker surface
supported_shells:
  - Codex
  - Claude Code
  - OpenCode
  - OpenClaw
  - OpenHands
install_modes:
  - local-checkout-stdio
  - host-native-folder-import
official_listing_state: clawhub-skill-page-live; Goose-review-pending; agent-skill-review-pending; openhands-closed-not-accepted
docs:
  - apps/mcp-server/README.md
  - docs/how-to/mcp-quickstart-1pager.md
  - docs/reference/mcp-distribution-contract.md
  - DISTRIBUTION.md
  - INTEGRATIONS.md
limitations:
  - not an official plugin
  - not a hosted service
  - no generic cross-host skill-registry listing yet
  - no live Goose or agent-skill.co listing yet
  - no live OpenHands/extensions listing; that lane was closed instead
pair_with:
  - SKILL.md
  - README.md
  - references/README.md
  - references/INSTALL.md
  - references/CAPABILITIES.md
  - references/DEMO.md
  - references/OPENHANDS_MCP_CONFIG.json
  - references/OPENCLAW_MCP_CONFIG.json
  - references/TROUBLESHOOTING.md
