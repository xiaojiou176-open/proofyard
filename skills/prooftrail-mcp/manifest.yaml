name: proofyard-mcp
version: 0.1.1
description: Portable public skill packet for Proofyard's governed stdio MCP browser-evidence surface.
protocol: stdio
transport: stdio
auth: local-with-optional-backend-token
entrypoint: SKILL.md
package_shape: skill-folder
registry_targets:
  clawhub:
    status: listed-live
    package_shape: skill-folder
    listing_url: https://www.clawhub.ai/skills/proofyard-mcp
    note: Fresh 2026-04-08 America/Los_Angeles read-back confirmed this listing is live.
    submit_via: clawhub publish . --slug proofyard-mcp --name "Proofyard MCP Skill" --version 0.1.1 --tags browser-evidence,mcp,recovery,proofyard
  openhands-extensions:
    status: review-pending
    package_shape: skill-folder
    submission_url: https://github.com/OpenHands/extensions/pull/161
    note: Fresh read-back confirms PR #161 is open; treat this as external review receipt, not a live listing.
    submit_via: submit this folder as skills/proofyard-mcp/ in OpenHands/extensions
surfaces:
  - repo-native MCP package
  - repo-owned install skill
  - publish-ready Docker surface
supported_shells:
  - Codex
  - Claude Code
  - OpenCode
  - OpenClaw
  - OpenHands
install_modes:
  - local-checkout-stdio
  - host-native-folder-import
official_listing_state: clawhub-live-openhands-review-pending
docs:
  - apps/mcp-server/README.md
  - docs/how-to/mcp-quickstart-1pager.md
  - docs/reference/mcp-distribution-contract.md
  - DISTRIBUTION.md
  - INTEGRATIONS.md
limitations:
  - not an official plugin
  - not a hosted service
  - no live OpenHands/extensions listing yet
pair_with:
  - SKILL.md
  - README.md
  - references/README.md
  - references/INSTALL.md
  - references/CAPABILITIES.md
  - references/DEMO.md
  - references/OPENHANDS_MCP_CONFIG.json
  - references/OPENCLAW_MCP_CONFIG.json
  - references/TROUBLESHOOTING.md
