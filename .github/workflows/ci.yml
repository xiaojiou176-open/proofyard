      - uses: actions/checkout@64ffef1ea610c4052efefeb955034987fb104bc4 # v4
      - uses: ./.github/actions/workspace-sanitize
      - name: Run TS mutation strict execution
        env:
          UIQ_CI_IMAGE_REF: ${{ needs.build_ci_image.outputs.image_ref }}
        run: bash scripts/ci/run-in-container.sh --task mutation-ts --gate ci-mutation-ts-strict
      - name: Run Python mutation strict execution
        env:
          UIQ_CI_IMAGE_REF: ${{ needs.build_ci_image.outputs.image_ref }}
        run: bash scripts/ci/run-in-container.sh --task mutation-py --gate ci-mutation-py-strict
      - name: Run mutation gate (effective coverage blocking)
        env:
          UIQ_CI_IMAGE_REF: ${{ needs.build_ci_image.outputs.image_ref }}
          UIQ_MUTATION_REQUIRED_CONTEXT: "true"
          UIQ_MUTATION_PY_MAX_SURVIVED: "0"
