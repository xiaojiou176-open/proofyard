              sudo bash -lc 'shopt -s dotglob nullglob; rm -rf -- "$1"/* "$1"/.[!.]* "$1"/..?*' _ "$workspace" || true
              sudo mkdir -p "$workspace" || true
              sudo chown "$(id -u):$(id -g)" "$workspace" || true
            else
              chmod -R u+rwX "$workspace" || true
              find "$workspace" -mindepth 1 -maxdepth 1 -exec rm -rf -- {} + || true
            fi
          fi
      - uses: actions/checkout@64ffef1ea610c4052efefeb955034987fb104bc4 # v4
      - uses: ./.github/actions/workspace-sanitize
      - uses: ./.github/actions/setup-deps
        with:
          node-version: "20"
          python-version: "3.11"
          pnpm-cache-dependency-path: pnpm-lock.yaml
          pnpm-install-command: cd apps/automation-runner && pnpm install --frozen-lockfile
          uv-sync-command: uv sync --frozen --extra dev
          enable-playwright: "true"
          playwright-lockfile-path: pnpm-lock.yaml
          playwright-cache-key-suffix: automation
          playwright-working-directory: automation
      - name: Apply Alembic migrations (automation backend db)
        run: |
          mkdir -p .runtime-cache/automation
          DATABASE_URL="sqlite+pysqlite:///./.runtime-cache/automation/tasks.db" uv run alembic -c apps/api/alembic.ini upgrade heads
      - name: Lint and dependency audit automation (parallel)
        run: |
          set -euo pipefail
          (cd apps/automation-runner && pnpm lint) &
          lint_pid=$!
          (cd apps/automation-runner && pnpm audit --audit-level=high) &
          audit_pid=$!
          wait "$lint_pid"
          wait "$audit_pid"
      - name: Run automation checks
        run: cd apps/automation-runner && pnpm check
      - name: Bootstrap backend
        uses: ./.github/actions/bootstrap-backend
        with:
          database-url: "sqlite+pysqlite:///./.runtime-cache/automation/tasks.db"
          log-file: ".runtime-cache/logs/backend.ci.log"
          port: "8000"
          run-migrations: "false"
      - name: Run automation tests
        run: cd apps/automation-runner && pnpm test
      - name: Runtime cache cleanup (lightweight)
        if: ${{ always() }}
        run: |
          ./scripts/runtime-gc.sh --scope logs --max-delete-per-run 100
          ./scripts/runtime-gc.sh --scope runs --keep-runs 20 --max-delete-per-run 100
          ./scripts/runtime-gc.sh --scope cache --max-delete-per-run 200
      - uses: ./.github/actions/workspace-sanitize
        if: ${{ always() }}
        with:
          mode: post

