            else
              chmod -R u+rwX "$workspace" || true
              find "$workspace" -mindepth 1 -maxdepth 1 -exec rm -rf -- {} + || true
            fi
          fi
      - uses: actions/checkout@64ffef1ea610c4052efefeb955034987fb104bc4 # v4
      - uses: ./.github/actions/workspace-sanitize
      - uses: ./.github/actions/setup-deps
        with:
          enable-python: "false"
          enable-playwright: "false"
          node-version: "20"
          pnpm-cache-dependency-path: pnpm-lock.yaml
          pnpm-install-command: cd apps/automation-runner && pnpm install --frozen-lockfile
      - name: Experimental reconstruction comparison (warning only)
        run: |
          cd apps/automation-runner
          pnpm run extract:video || true
          pnpm run generate:reconstruction -- --preview=.runtime-cache/non-existent.json || true
      - name: Upload failure bundle artifact
        if: ${{ failure() || cancelled() }}
        uses: ./.github/actions/failure-bundle
      - uses: ./.github/actions/workspace-sanitize
        if: ${{ always() }}
        with:
