    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    needs: [changes, root_web_typecheck, root_web_unit, root_web_ct, root_web_e2e]
    if: ${{ always() }}
    steps:
      - name: Pre-checkout workspace sanitize
        shell: bash
        run: |
          set -euo pipefail
          workspace="${GITHUB_WORKSPACE:?GITHUB_WORKSPACE is required}"
          home_dir="${HOME:-}"
          case "$workspace" in
            /|/.|/..|"")
              echo "::error::refusing dangerous workspace path: $workspace"
              exit 1
              ;;
          esac
          if [[ -n "$home_dir" && "$workspace" == "$home_dir" ]]; then
            echo "::error::refusing workspace equal to HOME: $workspace"
            exit 1
          fi
          if [[ -d "$workspace" ]]; then
            if command -v sudo >/dev/null 2>&1; then
              sudo chown -R "$(id -u):$(id -g)" "$workspace" || true
              sudo bash -lc 'shopt -s dotglob nullglob; rm -rf -- "$1"/* "$1"/.[!.]* "$1"/..?*' _ "$workspace" || true
              sudo mkdir -p "$workspace" || true
              sudo chown "$(id -u):$(id -g)" "$workspace" || true
            else
              chmod -R u+rwX "$workspace" || true
              find "$workspace" -mindepth 1 -maxdepth 1 -exec rm -rf -- {} + || true
            fi
          fi
      - uses: actions/checkout@64ffef1ea610c4052efefeb955034987fb104bc4 # v4
      - uses: ./.github/actions/workspace-sanitize
      - name: Aggregate root web gate
        run: |
          set -euo pipefail
          check_gate() {
            local gate="$1"
            local result="$2"
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "::error::root_web_gate dependency '$gate' concluded as '$result'"
              exit 1
            fi
          }
          check_gate "root_web_typecheck" "${{ needs.root_web_typecheck.result }}"
          check_gate "root_web_unit" "${{ needs.root_web_unit.result }}"
          check_gate "root_web_ct" "${{ needs.root_web_ct.result }}"
          check_gate "root_web_e2e" "${{ needs.root_web_e2e.result }}"
      - name: Collect required gate durations
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p .runtime-cache/ci .runtime-cache/artifacts/ci
          export API_URL="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/jobs?per_page=100"
          python3 - <<'PY'
          import json
          import os
          import urllib.request
          from pathlib import Path

          repo = os.environ["GITHUB_REPOSITORY"]
          run_id = os.environ["GITHUB_RUN_ID"]
          token = os.environ.get("GITHUB_TOKEN", "")
          url = os.environ.get("API_URL") or f"https://api.github.com/repos/{repo}/actions/runs/{run_id}/jobs?per_page=100"
          req = urllib.request.Request(
              url,
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "User-Agent": "uiq-ci-gate-durations",
              },
          )
          payload = {"jobs": []}
          api_warning = None
          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  payload = json.loads(resp.read().decode("utf-8"))
          except Exception as exc:
              api_warning = f"Collect required gate durations skipped API fetch: {exc}"
              print(f"::warning::{api_warning}")

          required_gates = [
              "backend",
              "backend_full",
              "core_contract_load",
              "strict_invariants_gate",
              "frontend",
              "frontend_e2e_required",
              "functional_regression_gate",
              "root_web_gate",
              "root_web_e2e",
              "root_web_typecheck",
              "root_web_unit",
              "root_web_ct",
              "openai_residue_gate",
              "mutation_report",
          ]

          jobs = {job.get("name"): job for job in payload.get("jobs", []) if isinstance(job, dict)}
          rows = []
          for gate in required_gates:
              job = jobs.get(gate, {})
              rows.append(
                  {
                      "name": gate,
                      "status": job.get("status", "missing"),
                      "conclusion": job.get("conclusion"),
                      "started_at": job.get("started_at"),
                      "completed_at": job.get("completed_at"),
                  }
              )

          report_path = Path(".runtime-cache/artifacts/ci/gate-duration-report.json")
          report = {"required_gates": rows}
          if api_warning:
              report["warning"] = api_warning
          report_path.write_text(json.dumps(report, ensure_ascii=False, indent=2), encoding="utf-8")

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as f:
                  f.write("## Required Gate Durations\n")
                  if api_warning:
                      f.write(f"> :warning: {api_warning}\n")
                  for row in rows:
                      f.write(
                          f"- `{row['name']}`: status={row['status']} conclusion={row['conclusion'] or 'n/a'} "
                          f"start={row['started_at'] or 'n/a'} end={row['completed_at'] or 'n/a'}\n"
                      )
          PY
      - name: Upload failure bundle artifact
        if: ${{ failure() || cancelled() }}
        uses: ./.github/actions/failure-bundle
      - uses: ./.github/actions/workspace-sanitize
        if: ${{ always() }}
        with:
          mode: post

  frontend:
    needs: [changes, build_ci_image]
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.ci_gatechain == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Pre-checkout workspace sanitize
        shell: bash
        run: |
          set -euo pipefail
          workspace="${GITHUB_WORKSPACE:?GITHUB_WORKSPACE is required}"
          home_dir="${HOME:-}"
          case "$workspace" in
            /|/.|/..|"")
              echo "::error::refusing dangerous workspace path: $workspace"
              exit 1
              ;;
          esac
          if [[ -n "$home_dir" && "$workspace" == "$home_dir" ]]; then
            echo "::error::refusing workspace equal to HOME: $workspace"
            exit 1
          fi
          if [[ -d "$workspace" ]]; then
            if command -v sudo >/dev/null 2>&1; then
              sudo chown -R "$(id -u):$(id -g)" "$workspace" || true
              sudo bash -lc 'shopt -s dotglob nullglob; rm -rf -- "$1"/* "$1"/.[!.]* "$1"/..?*' _ "$workspace" || true
              sudo mkdir -p "$workspace" || true
              sudo chown "$(id -u):$(id -g)" "$workspace" || true
            else
              chmod -R u+rwX "$workspace" || true
              find "$workspace" -mindepth 1 -maxdepth 1 -exec rm -rf -- {} + || true
            fi
          fi
      - uses: actions/checkout@64ffef1ea610c4052efefeb955034987fb104bc4 # v4
      - uses: ./.github/actions/workspace-sanitize
      - name: Frontend full gate
        env:
          UIQ_CI_IMAGE_REF: ${{ needs.build_ci_image.outputs.image_ref }}
        run: bash scripts/ci/run-in-container.sh --task frontend-full --gate ci-frontend-full
      - name: Runtime cache cleanup (lightweight)
        if: ${{ always() }}
        working-directory: .
        run: |
          ./scripts/runtime-gc.sh --scope logs --max-delete-per-run 100
          ./scripts/runtime-gc.sh --scope runs --keep-runs 20 --max-delete-per-run 100
          ./scripts/runtime-gc.sh --scope cache --max-delete-per-run 200
      - uses: ./.github/actions/workspace-sanitize
        if: ${{ always() }}
        with:
          mode: post

