name: CI

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      run_automation_profile:
        description: "Run optional automation dependency profile jobs"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true
# Contract anchors for apps/api/tests/test_nightly_ci_contracts.py
# bash scripts/ci/make-failure-bundle.sh || true
# .runtime-cache/artifacts/ci/failure-bundles/

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      automation: ${{ steps.filter.outputs.automation }}
      docs: ${{ steps.filter.outputs.docs }}
      ci_gatechain: ${{ steps.filter.outputs.ci_gatechain }}
    steps:
      - name: Pre-checkout workspace sanitize
        shell: bash
        run: |
          set -euo pipefail
          workspace="${GITHUB_WORKSPACE:?GITHUB_WORKSPACE is required}"
          home_dir="${HOME:-}"
          case "$workspace" in
            /|/.|/..|"")
              echo "::error::refusing dangerous workspace path: $workspace"
              exit 1
              ;;
          esac
          if [[ -n "$home_dir" && "$workspace" == "$home_dir" ]]; then
            echo "::error::refusing workspace equal to HOME: $workspace"
            exit 1
          fi
          if [[ -d "$workspace" ]]; then
            if command -v sudo >/dev/null 2>&1; then
              sudo chown -R "$(id -u):$(id -g)" "$workspace" || true
              sudo bash -lc 'shopt -s dotglob nullglob; rm -rf -- "$1"/* "$1"/.[!.]* "$1"/..?*' _ "$workspace" || true
              sudo mkdir -p "$workspace" || true
              sudo chown "$(id -u):$(id -g)" "$workspace" || true
            else
              chmod -R u+rwX "$workspace" || true
              find "$workspace" -mindepth 1 -maxdepth 1 -exec rm -rf -- {} + || true
            fi
          fi
      - uses: actions/checkout@64ffef1ea610c4052efefeb955034987fb104bc4 # v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/workspace-sanitize
      - name: Detect changed scopes
        id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        with:
          filters: |
            backend:
              - 'apps/api/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'apps/api/alembic.ini'
              - 'scripts/check-openapi-doc-contract.py'
              - 'scripts/run-contract-scan.sh'
              - 'scripts/run-load-k6-smoke.sh'
            frontend:
              - 'apps/web/**'
              - 'apps/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'playwright.config.*'
              - 'scripts/**'
            automation:
              - 'apps/automation-runner/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'uv.lock'
            docs:
              - 'docs/**'
              - '**/*.md'
              - '.env.example'
              - 'scripts/docs-gate.sh'
            ci_gatechain:
              - '.github/workflows/ci.yml'
              - '.github/workflows/nightly.yml'
              - '.github/workflows/manual.yml'
              - '.github/workflows/pre-commit.yml'
              - 'scripts/ci/*gate*'
              - 'scripts/ci/*truth*'
      - uses: ./.github/actions/workspace-sanitize
        if: ${{ always() }}
        with:
          mode: post

  build_ci_image:
    needs: [changes]
    if: ${{ github.repository_owner != 'xiaojiou176-open' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.build.outputs.image_ref }}
    steps:
      - uses: actions/checkout@64ffef1ea610c4052efefeb955034987fb104bc4 # v4
      - name: Login to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUNNER_TEMP: ${{ runner.temp }}
        run: |
          set -euo pipefail
          export HOME="${RUNNER_TEMP}/docker-home"
          export DOCKER_CONFIG="${HOME}/.docker"
          mkdir -p "${HOME}"
          mkdir -p "${DOCKER_CONFIG}"
          printf '%s\n' '{"auths":{},"credsStore":"","credHelpers":{}}' > "${DOCKER_CONFIG}/config.json"
          printf '%s' "$GITHUB_TOKEN" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
      - name: Build repo-owned CI image
        id: build
        run: |
          set -euo pipefail
          export HOME="${RUNNER_TEMP}/docker-home"
          export DOCKER_CONFIG="${HOME}/.docker"
          image_ref="$(bash scripts/ci/build-ci-image.sh --push | tail -n 1)"
          echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"

