  repo_truth_required_gate:
    name: repo truth deterministic gate (aggregate)
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - changes
      - openai_residue_gate
      - docs
      - hooks_equivalence_gate
      - security
      - security_scan_script
      - preflight_minimal
      - strict_invariants_gate
      - backend
      - backend_full
      - core_contract_load
      - frontend
      - frontend_e2e_required
      - functional_regression_gate
      - internal_governance_control_plane_gate
      - root_web_gate
      - mutation_report
    steps:
      - name: Pre-checkout workspace sanitize
        shell: bash
        run: |
          set -euo pipefail
          workspace="${GITHUB_WORKSPACE:?GITHUB_WORKSPACE is required}"
          home_dir="${HOME:-}"
          case "$workspace" in
            /|/.|/..|"")
              echo "::error::refusing dangerous workspace path: $workspace"
              exit 1
              ;;
          esac
          if [[ -n "$home_dir" && "$workspace" == "$home_dir" ]]; then
            echo "::error::refusing workspace equal to HOME: $workspace"
            exit 1
          fi
          if [[ -d "$workspace" ]]; then
            if command -v sudo >/dev/null 2>&1; then
              sudo chown -R "$(id -u):$(id -g)" "$workspace" || true
              sudo bash -lc 'shopt -s dotglob nullglob; rm -rf -- "$1"/* "$1"/.[!.]* "$1"/..?*' _ "$workspace" || true
              sudo mkdir -p "$workspace" || true
              sudo chown "$(id -u):$(id -g)" "$workspace" || true
            else
              chmod -R u+rwX "$workspace" || true
              find "$workspace" -mindepth 1 -maxdepth 1 -exec rm -rf -- {} + || true
            fi
          fi
      - uses: actions/checkout@64ffef1ea610c4052efefeb955034987fb104bc4 # v4
      - uses: ./.github/actions/workspace-sanitize
      - uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: "20"
      - name: Install root deps for manifest validators
        run: pnpm install --frozen-lockfile
      - name: Aggregate deterministic repo-truth CI gates
        run: |
          set -euo pipefail
          require_success() {
            local gate="$1"
            local result="$2"
            if [[ "$result" != "success" ]]; then
              echo "::error::repo_truth_required_gate dependency '$gate' must be success, got '$result'"
              exit 1
            fi
          }
          require_when_present() {
            local gate="$1"
            local result="$2"
            if [[ "$result" == "skipped" ]]; then
              return 0
            fi
            require_success "$gate" "$result"
          }
          allow_skipped() {
            local gate="$1"
            local result="$2"
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "::error::repo_truth_required_gate optional dependency '$gate' invalid result '$result' (allowed: success/skipped)"
              exit 1
            fi
          }
          require_success "changes" "${{ needs.changes.result }}"
          allow_skipped "openai_residue_gate" "${{ needs.openai_residue_gate.result }}"
          core_required="${{ (github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.automation == 'true') && '1' || '0' }}"
          if [[ "$core_required" == "1" ]]; then
            require_when_present "hooks_equivalence_gate" "${{ needs.hooks_equivalence_gate.result }}"
            require_when_present "security_scan_script" "${{ needs.security_scan_script.result }}"
            require_when_present "preflight_minimal" "${{ needs.preflight_minimal.result }}"
            require_when_present "core_contract_load" "${{ needs.core_contract_load.result }}"
            require_when_present "strict_invariants_gate" "${{ needs.strict_invariants_gate.result }}"
            require_when_present "internal_governance_control_plane_gate" "${{ needs.internal_governance_control_plane_gate.result }}"
            require_when_present "root_web_gate" "${{ needs.root_web_gate.result }}"
            require_when_present "mutation_report" "${{ needs.mutation_report.result }}"
          else
            allow_skipped "hooks_equivalence_gate" "${{ needs.hooks_equivalence_gate.result }}"
            allow_skipped "security_scan_script" "${{ needs.security_scan_script.result }}"
            allow_skipped "preflight_minimal" "${{ needs.preflight_minimal.result }}"
            allow_skipped "core_contract_load" "${{ needs.core_contract_load.result }}"
            allow_skipped "strict_invariants_gate" "${{ needs.strict_invariants_gate.result }}"
            allow_skipped "internal_governance_control_plane_gate" "${{ needs.internal_governance_control_plane_gate.result }}"
            allow_skipped "root_web_gate" "${{ needs.root_web_gate.result }}"
            allow_skipped "mutation_report" "${{ needs.mutation_report.result }}"
          fi

          docs_required="${{ (github.event_name == 'workflow_dispatch' || needs.changes.outputs.docs == 'true') && '1' || '0' }}"
          backend_required="${{ (github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true') && '1' || '0' }}"
          frontend_required="${{ (github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true') && '1' || '0' }}"
          functional_required="${{ (github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.automation == 'true') && '1' || '0' }}"

          if [[ "$docs_required" == "1" ]]; then
            require_when_present "docs" "${{ needs.docs.result }}"
          else
            allow_skipped "docs" "${{ needs.docs.result }}"
          fi

          if [[ "$backend_required" == "1" ]]; then
            require_when_present "backend" "${{ needs.backend.result }}"
            require_when_present "backend_full" "${{ needs.backend_full.result }}"
          else
            allow_skipped "backend" "${{ needs.backend.result }}"
            allow_skipped "backend_full" "${{ needs.backend_full.result }}"
          fi

          if [[ "$frontend_required" == "1" ]]; then
            require_when_present "frontend" "${{ needs.frontend.result }}"
            require_when_present "frontend_e2e_required" "${{ needs.frontend_e2e_required.result }}"
          else
            allow_skipped "frontend" "${{ needs.frontend.result }}"
            allow_skipped "frontend_e2e_required" "${{ needs.frontend_e2e_required.result }}"
          fi

          if [[ "$functional_required" == "1" ]]; then
            require_when_present "functional_regression_gate" "${{ needs.functional_regression_gate.result }}"
          else
            allow_skipped "functional_regression_gate" "${{ needs.functional_regression_gate.result }}"
          fi

          allow_skipped "security" "${{ needs.security.result }}"
      - name: Generate repo-truth true-green manifest (ci)
        run: |
          node scripts/ci/generate-true-green-manifest.mjs \
            --layer ci \
            --run-id "${{ github.run_id }}-${{ github.run_attempt }}-repo-truth-required-gate" \
            --out .runtime-cache/artifacts/ci/true-green-manifest-ci.json \
            --decision passed \
            --reason-codes gate.true_green.passed.ci.repo_truth_required_gate
      - name: Validate repo-truth true-green manifest (ci)
        run: |
          node scripts/ci/validate-true-green-manifest.mjs \
            --schema contracts/true-green-manifest.schema.json \
            --input .runtime-cache/artifacts/ci/true-green-manifest-ci.json
      - name: Upload repo-truth true-green manifest (ci)
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: uiq-ci-true-green-manifest
          path: .runtime-cache/artifacts/ci/true-green-manifest-ci.json
          retention-days: 7
          if-no-files-found: error
      - uses: ./.github/actions/workspace-sanitize
        if: ${{ always() }}
        with:
          mode: post
