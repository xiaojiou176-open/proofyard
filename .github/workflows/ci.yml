              sudo bash -lc 'shopt -s dotglob nullglob; rm -rf -- "$1"/* "$1"/.[!.]* "$1"/..?*' _ "$workspace" || true
              sudo mkdir -p "$workspace" || true
              sudo chown "$(id -u):$(id -g)" "$workspace" || true
            else
              chmod -R u+rwX "$workspace" || true
