              sudo bash -lc 'shopt -s dotglob nullglob; rm -rf -- "$1"/* "$1"/.[!.]* "$1"/..?*' _ "$workspace" || true
              sudo mkdir -p "$workspace" || true
              sudo chown "$(id -u):$(id -g)" "$workspace" || true
            else
              chmod -R u+rwX "$workspace" || true
              find "$workspace" -mindepth 1 -maxdepth 1 -exec rm -rf -- {} + || true
            fi
          fi
      - uses: actions/checkout@64ffef1ea610c4052efefeb955034987fb104bc4 # v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/workspace-sanitize
      - uses: ./.github/actions/setup-deps
        with:
          pnpm-cache: "false"
          node-version: "20"
          python-version: "3.11"
          enable-playwright: "false"
          uv-sync-command: uv sync --frozen --extra dev
      - name: Ensure docker compose plugin (Linux hosted strict gate prerequisite)
        if: ${{ runner.os == 'Linux' }}
        run: |
          set -euo pipefail
          if docker compose version >/dev/null 2>&1; then
            exit 0
          fi
          sudo apt-get update
          if sudo apt-get install -y docker-compose-plugin; then
            docker compose version
            exit 0
          fi
          sudo apt-get install -y docker-compose
          docker-compose version
      - name: Hooks equivalence hard gate (lint + test-truth + docs-link)
        env:
          UIQ_DOCS_LINK_BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || github.event.before }}
          UIQ_DOCS_LINK_HEAD_REF: ${{ github.sha }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: bash scripts/ci/hooks-equivalence-gate.sh
      - name: Upload hooks equivalence artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: hooks-equivalence-gate
          path: |
            .runtime-cache/artifacts/ci/hooks-equivalence-gate.json
            .runtime-cache/artifacts/ci/hooks-equivalence-gate.md
            .runtime-cache/artifacts/ci/uiq-test-truth-gate-ci-equivalence.json
            .runtime-cache/artifacts/ci/uiq-test-truth-gate-ci-equivalence.md
          retention-days: 7
      - name: Upload failure bundle artifact
        if: ${{ failure() || cancelled() }}
        uses: ./.github/actions/failure-bundle
      - uses: ./.github/actions/workspace-sanitize
        if: ${{ always() }}
        with:
          mode: post

