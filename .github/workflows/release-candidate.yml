name: Release Candidate Gate

on:
  workflow_dispatch:
    inputs:
      release_candidate_tag:
        description: "Release candidate tag to evaluate (defaults to latest tag)"
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build_ci_image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.build.outputs.image_ref }}
    steps:
      - uses: actions/checkout@64ffef1ea610c4052efefeb955034987fb104bc4 # v4
      - uses: ./.github/actions/repo-checkout
      - name: Login to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUNNER_TEMP: ${{ runner.temp }}
        run: |
          set -euo pipefail
          export HOME="${RUNNER_TEMP}/docker-home"
          export DOCKER_CONFIG="${HOME}/.docker"
          mkdir -p "${HOME}"
          mkdir -p "${DOCKER_CONFIG}"
          printf '%s\n' '{"auths":{},"credsStore":"","credHelpers":{}}' > "${DOCKER_CONFIG}/config.json"
          printf '%s' "$GITHUB_TOKEN" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
      - name: Build repo-owned CI image
        id: build
        env:
          RUNNER_TEMP: ${{ runner.temp }}
        run: |
          set -euo pipefail
          export HOME="${RUNNER_TEMP}/docker-home"
          export DOCKER_CONFIG="${HOME}/.docker"
          image_ref="$(bash scripts/ci/build-ci-image.sh --push | tail -n 1)"
          echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"

  docs-gate:
    needs: build_ci_image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@64ffef1ea610c4052efefeb955034987fb104bc4 # v4
      - uses: ./.github/actions/repo-checkout
      - name: Docs gate
        env:
          UIQ_CI_IMAGE_REF: ${{ needs.build_ci_image.outputs.image_ref }}
        run: bash scripts/ci/run-in-container.sh --task release-docs-gate --gate release-docs-gate

  type-gate:
    needs: build_ci_image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@64ffef1ea610c4052efefeb955034987fb104bc4 # v4
      - uses: ./.github/actions/repo-checkout
      - name: Root typecheck gate
        env:
          UIQ_CI_IMAGE_REF: ${{ needs.build_ci_image.outputs.image_ref }}
        run: bash scripts/ci/run-in-container.sh --task release-typecheck --gate release-typecheck

  security-gate:
    needs: build_ci_image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@64ffef1ea610c4052efefeb955034987fb104bc4 # v4
      - uses: ./.github/actions/repo-checkout
      - name: Release security scan
        env:
          UIQ_CI_IMAGE_REF: ${{ needs.build_ci_image.outputs.image_ref }}
        run: bash scripts/ci/run-in-container.sh --task security-scan --gate release-security-gate

  release-gate:
    runs-on: ubuntu-latest
    needs:
      - build_ci_image
      - docs-gate
      - type-gate
      - security-gate
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@64ffef1ea610c4052efefeb955034987fb104bc4 # v4
      - uses: ./.github/actions/repo-checkout
      - name: Release candidate gate (containerized)
        env:
          UIQ_CI_IMAGE_REF: ${{ needs.build_ci_image.outputs.image_ref }}
          RELEASE_CANDIDATE_TAG: ${{ inputs.release_candidate_tag || '' }}
        run: bash scripts/ci/run-in-container.sh --task release-candidate-gate --gate release-candidate-gate
      - name: generate-true-green-manifest (release)
        run: |
          node scripts/ci/generate-true-green-manifest.mjs \
            --layer release \
            --run-id "${{ github.run_id }}-${{ github.run_attempt }}-release-gate" \
            --out .runtime-cache/artifacts/ci/true-green-manifest-release.json \
            --decision passed \
            --reason-codes gate.true_green.passed.release.gate
      - name: validate-true-green-manifest (release)
        run: |
          node scripts/ci/validate-true-green-manifest.mjs \
            --schema contracts/true-green-manifest.schema.json \
            --input .runtime-cache/artifacts/ci/true-green-manifest-release.json
      - name: Upload true-green manifest (release)
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: uiq-release-true-green-manifest
          path: .runtime-cache/artifacts/ci/true-green-manifest-release.json
          retention-days: 7
          if-no-files-found: error
      - name: Upload release gate report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-gate-report
          path: .runtime-cache/release-gate/
          retention-days: 7
      - name: Generate release supply-chain contract bundle (placeholder-aware)
        run: |
          node scripts/release/generate-supply-chain-artifacts.mjs .runtime-cache/artifacts/release/supply-chain
      - name: Attest release supply-chain contract bundle
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: .runtime-cache/artifacts/release/supply-chain/*
      - name: Validate release supply-chain contract artifacts
        run: |
          node scripts/ci/check-release-supply-chain.mjs
      - name: Upload release supply-chain artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-supply-chain-artifacts
          path: .runtime-cache/artifacts/release/supply-chain/
          retention-days: 7
