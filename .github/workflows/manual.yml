name: Manual Gate

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: manual-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_ci_image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.build.outputs.image_ref }}
    steps:
      - uses: ./.github/actions/repo-checkout
      - name: Login to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUNNER_TEMP: ${{ runner.temp }}
        run: |
          set -euo pipefail
          export HOME="${RUNNER_TEMP}/docker-home"
          export DOCKER_CONFIG="${HOME}/.docker"
          mkdir -p "${HOME}"
          mkdir -p "${DOCKER_CONFIG}"
          printf '%s\n' '{"auths":{},"credsStore":"","credHelpers":{}}' > "${DOCKER_CONFIG}/config.json"
          printf '%s' "$GITHUB_TOKEN" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
      - name: Build repo-owned CI image
        id: build
        env:
          RUNNER_TEMP: ${{ runner.temp }}
        run: |
          set -euo pipefail
          export HOME="${RUNNER_TEMP}/docker-home"
          export DOCKER_CONFIG="${HOME}/.docker"
          image_ref="$(bash scripts/ci/build-ci-image.sh --push | tail -n 1)"
          echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"

  manual-trend-signals:
    needs: build_ci_image
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/repo-checkout
      - uses: ./.github/actions/setup-deps
        with:
          enable-python: "false"
          enable-playwright: "false"
          node-version: "20"
      - name: ENV governance trend check (non-blocking)
        id: env_governance_trend
        continue-on-error: true
        run: pnpm env:governance:check
      - name: Validate gate scripts syntax (non-blocking trend)
        id: script_syntax_trend
        continue-on-error: true
        run: |
          bash -n scripts/release/check-workflow-pnpm-version-guard.sh scripts/release/generate-release-notes.sh
          node --check scripts/ci/uiq-test-truth-gate.mjs
          node --check scripts/ci/uiq-flake-budget.mjs
          node --check scripts/ci/uiq-failure-ticketing.mjs
          node --check scripts/ci/uiq-ai-review.mjs
          node --check scripts/ci/uiq-gemini-live-smoke-gate.mjs
          node --check scripts/ci/uiq-gemini-accuracy-gate.mjs
          node --check scripts/ci/uiq-gemini-concurrency-gate.mjs
          node --check scripts/ci/uiq-cross-target-benchmark.mjs
          node --check scripts/ci/uiq-sla-and-clusters.mjs
          node --check scripts/ci/verify-run-evidence.mjs
          node --check scripts/ci/check-engine-runtime.mjs
          node --check scripts/perf/perf-regression-guard.mjs
          node --check scripts/api/check-breaking-contract.mjs
      - name: MCP command parity + perfect-mode guard tests (non-blocking trend)
        id: mcp_parity_trend
        continue-on-error: true
        run: node --import tsx --test apps/mcp-server/tests/mcp-command-parity.test.ts apps/mcp-server/tests/mcp-perfect-mode.test.ts
      - name: Aggregate manual pre-run non-blocking trend signals
        if: ${{ always() }}
        env:
          ENV_GOVERNANCE_RESULT: ${{ steps.env_governance_trend.outcome }}
          SCRIPT_SYNTAX_RESULT: ${{ steps.script_syntax_trend.outcome }}
          MCP_PARITY_RESULT: ${{ steps.mcp_parity_trend.outcome }}
        run: |
          set -euo pipefail
          warn_count=0
          check_signal() {
            local name="$1"
            local result="$2"
            case "$result" in
              success|skipped)
                echo "[manual-trend] ${name}: ${result}"
                ;;
              failure)
                echo "::warning::[manual-trend] ${name} failed (non-blocking)"
                warn_count=$((warn_count + 1))
                ;;
              *)
                echo "::error::[manual-trend] ${name} returned unexpected result: ${result}"
                exit 1
                ;;
            esac
          }
          check_signal "env-governance" "${ENV_GOVERNANCE_RESULT}"
          check_signal "script-syntax" "${SCRIPT_SYNTAX_RESULT}"
          check_signal "mcp-parity" "${MCP_PARITY_RESULT}"
          echo "[manual-trend] pre-run non-blocking warning count=${warn_count}"

  manual-core-run:
    needs: build_ci_image
    runs-on: ubuntu-latest
    environment: owner-approved-sensitive
    steps:
      - uses: ./.github/actions/repo-checkout
      - name: Manual core run (Linux/Web required, containerized)
        env:
          UIQ_CI_IMAGE_REF: ${{ needs.build_ci_image.outputs.image_ref }}
          UIQ_ORCHESTRATOR_PARALLEL: "1"
          UIQ_ORCHESTRATOR_MAX_PARALLEL_TASKS: "6"
          UIQ_ENABLE_REAL_BACKEND_TESTS: "true"
        run: bash scripts/ci/run-in-container.sh --task manual-core-run --gate manual-core-run

  manual-trend-post-run:
    runs-on: ubuntu-latest
    needs: [build_ci_image, manual-core-run]
    environment: owner-approved-sensitive
    steps:
      - uses: ./.github/actions/repo-checkout
      - uses: ./.github/actions/setup-deps
        with:
          enable-python: "false"
          enable-playwright: "false"
          node-version: "20"
      - name: Enforce live API key and external base URL contract (manual trend required)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || secrets.GOOGLE_API_KEY || '' }}
          UIQ_BASE_URL: ${{ vars.UIQ_BASE_URL || secrets.UIQ_BASE_URL || vars.BASE_URL || secrets.BASE_URL || '' }}
        run: |
          set -euo pipefail
          if [[ -z "${GEMINI_API_KEY}" ]]; then
            echo "::error::missing GEMINI_API_KEY/GOOGLE_API_KEY for manual trend live gates"
            exit 1
          fi
          if [[ -z "${UIQ_BASE_URL}" ]]; then
            echo "::error::missing UIQ_BASE_URL/BASE_URL for manual trend live gates"
            exit 1
          fi
      - name: Gemini accuracy gate (manual trend, non-blocking)
        id: gemini_accuracy_trend
        continue-on-error: true
        run: node scripts/ci/uiq-gemini-accuracy-gate.mjs --profile manual --strict true
      - name: Gemini live API smoke gate (manual trend, non-blocking)
        id: gemini_live_smoke_trend
        continue-on-error: true
        env:
          UIQ_GEMINI_LIVE_SMOKE_REQUIRED: "true"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || '' }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY || '' }}
          UIQ_BASE_URL: ${{ vars.UIQ_BASE_URL || secrets.UIQ_BASE_URL || vars.BASE_URL || secrets.BASE_URL || '' }}
        run: node scripts/ci/uiq-gemini-live-smoke-gate.mjs --strict true
      - name: Gemini concurrency gate (manual trend, non-blocking)
        id: gemini_concurrency_trend
        continue-on-error: true
        run: node scripts/ci/uiq-gemini-concurrency-gate.mjs --profile manual --strict true
      - name: AI review (manual trend, non-blocking)
        id: ai_review_trend
        continue-on-error: true
        run: node --import tsx scripts/ci/uiq-ai-review.mjs --profile manual --strict true --severity-threshold high --max-artifacts 40 --emit-issue false --emit-pr-comment false
      - name: Upload AI review artifacts (always)
        if: ${{ always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: uiq-manual-ai-review
          path: |
            .runtime-cache/artifacts/ci/uiq-ai-review-manual.json
            .runtime-cache/artifacts/ci/uiq-ai-review-manual.md
          if-no-files-found: warn
      - name: Aggregate manual post-run non-blocking trend signals
        if: ${{ always() }}
        env:
          GEMINI_ACCURACY_RESULT: ${{ steps.gemini_accuracy_trend.outcome }}
          GEMINI_LIVE_SMOKE_RESULT: ${{ steps.gemini_live_smoke_trend.outcome }}
          GEMINI_CONCURRENCY_RESULT: ${{ steps.gemini_concurrency_trend.outcome }}
          AI_REVIEW_RESULT: ${{ steps.ai_review_trend.outcome }}
        run: |
          set -euo pipefail
          warn_count=0
          check_signal() {
            local name="$1"
            local result="$2"
            case "$result" in
              success|skipped)
                echo "[manual-trend] ${name}: ${result}"
                ;;
              failure)
                echo "::warning::[manual-trend] ${name} failed (non-blocking)"
                warn_count=$((warn_count + 1))
                ;;
              *)
                echo "::error::[manual-trend] ${name} returned unexpected result: ${result}"
                exit 1
                ;;
            esac
          }
          check_signal "gemini-accuracy" "${GEMINI_ACCURACY_RESULT}"
          check_signal "gemini-live-smoke" "${GEMINI_LIVE_SMOKE_RESULT}"
          check_signal "gemini-concurrency" "${GEMINI_CONCURRENCY_RESULT}"
          check_signal "ai-review" "${AI_REVIEW_RESULT}"
          echo "[manual-trend] post-run non-blocking warning count=${warn_count}"

  manual-hard-gates:
    needs: [build_ci_image, manual-core-run]
    runs-on: ubuntu-24.04
    steps:
      - uses: ./.github/actions/repo-checkout
      - uses: ./.github/actions/setup-deps
        with:
          enable-python: "false"
          enable-playwright: "false"
          node-version: "20"
      - name: Flake budget gate (strict for manual)
        run: node scripts/ci/uiq-flake-budget.mjs --profile manual --strict true --dynamic-baseline false
      - name: SLA + failure cluster summary (manual)
        run: node scripts/ci/uiq-sla-and-clusters.mjs --profile manual
      - name: Failure ticketing clusters (manual)
        env:
          UIQ_AUTO_TICKETING: ${{ env.UIQ_AUTO_TICKETING || vars.UIQ_AUTO_TICKETING || 'false' }}
          GH_TOKEN: ${{ github.token }}
        run: |
          EMIT="${UIQ_AUTO_TICKETING:-false}"
          node scripts/ci/uiq-failure-ticketing.mjs \
            --runs-dir .runtime-cache/artifacts/runs \
            --out-dir .runtime-cache/artifacts/ci \
            --top-n 25 \
            --sample-limit 5 \
            --emit-gh-issues "$EMIT" \
            --emit-pr-comment false \
            --repo "${GITHUB_REPOSITORY}"
      - name: Cross-target benchmark report (manual)
        run: node scripts/ci/uiq-cross-target-benchmark.mjs --runs-dir .runtime-cache/artifacts/runs --out-dir .runtime-cache/artifacts/ci --profile manual --lookback-days 30 --limit 200 --targets web,tauri,swift
      - name: Aggregate pre-commit strict metrics (manual)
        run: node scripts/ci/precommit-strict-metrics-aggregate.mjs
      - name: Aggregate governance trend report (manual)
        run: node scripts/ci/governance-trend-report.mjs
      - name: Upload pre-commit strict manual summary artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: precommit-strict-manual-summary
          path: |
            .runtime-cache/artifacts/ci/precommit-strict-manual-summary.json
            .runtime-cache/artifacts/ci/precommit-strict-manual-summary.md
          retention-days: 7
          if-no-files-found: error
      - name: Upload governance trend report artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: governance-trend-report
          path: |
            .runtime-cache/artifacts/ci/governance-trend-report.json
            .runtime-cache/artifacts/ci/governance-trend-report.md
          retention-days: 7
          if-no-files-found: error

  manual-release-notes:
    runs-on: ubuntu-latest
    needs: manual-core-run
    steps:
      - uses: ./.github/actions/repo-checkout
      - name: Generate Release Notes (non-blocking)
        continue-on-error: true
        run: ./scripts/release/generate-release-notes.sh
      - name: Upload Release Notes Artifact (non-blocking)
        if: ${{ always() }}
        continue-on-error: true
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-notes-vnext
          path: .runtime-cache/artifacts/release/release-notes-vnext.md

  manual-upload-artifacts:
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - manual-core-run
      - manual-hard-gates
      - manual-trend-post-run
    steps:
      - uses: ./.github/actions/repo-checkout
      - name: Upload Artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: uiq-manual-run
          path: |
            .runtime-cache/artifacts/runs/
            .runtime-cache/artifacts/ci/
          retention-days: 14

  desktop-regression-macos:
    if: ${{ vars.UIQ_ENABLE_DESKTOP_REGRESSION == 'true' }}
    runs-on: macos-latest
    environment: owner-approved-sensitive
    # The only host-specific public exception uses GitHub-hosted macOS because Xcode,
    # tauri-driver, bundle IDs, and the native app runtime cannot be expressed as linux/amd64 CI image tasks.
    env:
      UIQ_TAURI_APP_PATH: ${{ vars.UIQ_TAURI_APP_PATH || secrets.UIQ_TAURI_APP_PATH || '' }}
      UIQ_SWIFT_BUNDLE_ID: ${{ vars.UIQ_SWIFT_BUNDLE_ID || secrets.UIQ_SWIFT_BUNDLE_ID || '' }}
      UIQ_DESKTOP_AUTOMATION_MODE: operator-manual
      UIQ_DESKTOP_AUTOMATION_REASON: github-workflow-manual-desktop-regression
    steps:
      - uses: ./.github/actions/repo-checkout
      - uses: ./.github/actions/setup-deps
        with:
          enable-python: "false"
          enable-playwright: "false"
          node-version: "20"
      - name: Verify desktop regression prerequisites
        run: |
          set -euo pipefail
          xcodebuild -version
          if [[ -z "${UIQ_TAURI_APP_PATH}" ]]; then
            echo "UIQ_TAURI_APP_PATH is required for tauri.regression" >&2
            exit 1
          fi
          if [[ -z "${UIQ_SWIFT_BUNDLE_ID}" ]]; then
            echo "UIQ_SWIFT_BUNDLE_ID is required for swift.regression" >&2
            exit 1
          fi
          if ! command -v tauri-driver >/dev/null 2>&1; then
            if ! command -v cargo >/dev/null 2>&1; then
              echo "cargo is required to install tauri-driver on macOS runners" >&2
              exit 1
            fi
            cargo install tauri-driver --locked
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.cargo/bin:$PATH"
          fi
          tauri-driver --help >/dev/null
      - name: Run Tauri Regression Profile
        run: pnpm uiq run --profile tauri.regression --target tauri.macos --app "${UIQ_TAURI_APP_PATH}"
      - name: Verify Tauri regression evidence (hard gate)
        run: node scripts/ci/verify-run-evidence.mjs --profile tauri.regression
      - name: Run Swift Regression Profile
        run: pnpm uiq run --profile swift.regression --target swift.macos --bundle-id "${UIQ_SWIFT_BUNDLE_ID}"
      - name: Verify Swift regression evidence (hard gate)
        run: node scripts/ci/verify-run-evidence.mjs --profile swift.regression
      - name: Upload Desktop Regression Artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: uiq-manual-desktop-regression
          path: |
            .runtime-cache/artifacts/runs/

  manual-summary-gate:
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - manual-trend-signals
      - manual-core-run
      - manual-trend-post-run
      - manual-hard-gates
      - manual-release-notes
      - manual-upload-artifacts
      - desktop-regression-macos
    steps:
      - name: Aggregate manual job graph hard gates
        env:
          WEEKLY_TREND_SIGNALS_RESULT: ${{ needs.manual-trend-signals.result }}
          WEEKLY_CORE_RUN_RESULT: ${{ needs.manual-core-run.result }}
          WEEKLY_TREND_POST_RUN_RESULT: ${{ needs.manual-trend-post-run.result }}
          WEEKLY_HARD_GATES_RESULT: ${{ needs.manual-hard-gates.result }}
          WEEKLY_RELEASE_NOTES_RESULT: ${{ needs.manual-release-notes.result }}
          WEEKLY_UPLOAD_ARTIFACTS_RESULT: ${{ needs.manual-upload-artifacts.result }}
          DESKTOP_REGRESSION_MACOS_RESULT: ${{ needs.desktop-regression-macos.result }}
          DESKTOP_REGRESSION_REQUIRED: ${{ vars.UIQ_ENABLE_DESKTOP_REGRESSION || 'false' }}
        run: |
          set -euo pipefail
          hard_fail=0
          warn_count=0

          check_hard_gate() {
            local name="$1"
            local result="$2"
            case "$result" in
              success)
                echo "[manual-summary] hard gate ${name}: ${result}"
                ;;
              *)
                echo "::error::[manual-summary] hard gate ${name} is ${result}"
                hard_fail=1
                ;;
            esac
          }

          check_trend_or_optional() {
            local name="$1"
            local result="$2"
            case "$result" in
              success|skipped)
                echo "[manual-summary] non-blocking ${name}: ${result}"
                ;;
              failure|cancelled)
                echo "::warning::[manual-summary] non-blocking ${name}: ${result}"
                warn_count=$((warn_count + 1))
                ;;
              *)
                echo "::error::[manual-summary] non-blocking ${name} returned unexpected result: ${result}"
                hard_fail=1
                ;;
            esac
          }

          check_desktop_gate() {
            local result="$1"
            if [[ "${DESKTOP_REGRESSION_REQUIRED}" == "true" ]]; then
              check_hard_gate "desktop-regression-macos" "$result"
            else
              check_trend_or_optional "desktop-regression-macos(optional)" "$result"
            fi
          }

          check_hard_gate "manual-core-run" "${WEEKLY_CORE_RUN_RESULT}"
          check_hard_gate "manual-hard-gates" "${WEEKLY_HARD_GATES_RESULT}"
          check_hard_gate "manual-upload-artifacts" "${WEEKLY_UPLOAD_ARTIFACTS_RESULT}"
          check_desktop_gate "${DESKTOP_REGRESSION_MACOS_RESULT}"

          check_trend_or_optional "manual-trend-signals" "${WEEKLY_TREND_SIGNALS_RESULT}"
          check_trend_or_optional "manual-trend-post-run" "${WEEKLY_TREND_POST_RUN_RESULT}"
          check_trend_or_optional "manual-release-notes" "${WEEKLY_RELEASE_NOTES_RESULT}"

          echo "[manual-summary] non-blocking warning count=${warn_count}"
          if [[ "$hard_fail" -ne 0 ]]; then
            echo "::error::Manual hard gates failed in job graph"
            exit 1
          fi
