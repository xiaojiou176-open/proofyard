openapi: 3.0.3
info:
  title: Webaudit Platform API
  version: 0.2.0
  description: "Evidence-first browser automation platform API for canonical runs, operator workflows, retained evidence, recovery, and governed side roads."
servers:
  - url: http://localhost:17380
paths:
  /:
    get:
      operationId: getRoot
      summary: Service readiness
      responses:
        "200":
          description: Service ready message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RootResponse"
  /health/:
    get:
      operationId: getHealth
      summary: Health check
      responses:
        "200":
          description: Service health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /health/diagnostics:
    get:
      operationId: getDiagnostics
      summary: Runtime diagnostics
      responses:
        "200":
          description: Diagnostics snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosticsResponse"
  /health/alerts:
    get:
      operationId: getAlerts
      summary: Alert status
      responses:
        "200":
          description: Alerts snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertsResponse"
  /health/metrics:
    get:
      operationId: getHealthMetrics
      summary: Prometheus metrics snapshot
      responses:
        "200":
          description: Prometheus text format
          content:
            text/plain:
              schema:
                type: string
  /health/rum:
    post:
      operationId: postRumMetric
      summary: Ingest frontend RUM metric sample
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RumMetricIngestRequest"
      responses:
        "202":
          description: RUM metric accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RumMetricIngestResponse"
  /metrics:
    get:
      operationId: getMetrics
      summary: Prometheus metrics snapshot
      responses:
        "200":
          description: Prometheus text format
          content:
            text/plain:
              schema:
                type: string
  /api/csrf:
    get:
      operationId: getCsrfToken
      summary: Issue csrf token
      responses:
        "200":
          description: CSRF token payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CsrfResponse"
  /api/register:
    post:
      operationId: postRegisterUser
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registered user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
  /api/automation/commands:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    get:
      operationId: listAutomationCommands
      summary: List automation commands
      responses:
        "200":
          description: Automation command list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationCommandListResponse"
  /api/automation/tasks:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    get:
      operationId: listAutomationTasks
      summary: List automation tasks
      responses:
        "200":
          description: Task list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationTaskListResponse"
  /api/automation/tasks/{task_id}:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    get:
      operationId: getAutomationTask
      summary: Get task by id
      parameters:
        - in: path
          name: task_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationTask"
  /api/automation/run:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    post:
      operationId: runAutomationCommand
      summary: Run automation command
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutomationRunRequest"
      responses:
        "200":
          description: Created automation task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationRunResponse"
  /api/automation/tasks/{task_id}/cancel:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    post:
      operationId: cancelAutomationTask
      summary: Cancel automation task
      parameters:
        - in: path
          name: task_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task snapshot after cancellation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationTask"
  /api/computer-use/sessions:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    post:
      operationId: createComputerUseSession
      summary: Create computer-use session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateComputerUseSessionRequest"
      responses:
        "200":
          description: Created computer-use session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComputerUseSessionResponse"
  /api/computer-use/sessions/{session_id}/preview:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    post:
      operationId: previewComputerUseAction
      summary: Preview computer-use action
      parameters:
        - in: path
          name: session_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreviewComputerUseActionRequest"
      responses:
        "200":
          description: Previewed action
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComputerUseActionResponse"
  /api/computer-use/sessions/{session_id}/confirm/{action_id}:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    post:
      operationId: confirmComputerUseAction
      summary: Confirm or reject computer-use action
      parameters:
        - in: path
          name: session_id
          required: true
          schema:
            type: string
        - in: path
          name: action_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmComputerUseActionRequest"
      responses:
        "200":
          description: Action confirmation snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComputerUseActionResponse"
  /api/computer-use/sessions/{session_id}/execute/{action_id}:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    post:
      operationId: executeComputerUseAction
      summary: Execute computer-use action
      parameters:
        - in: path
          name: session_id
          required: true
          schema:
            type: string
        - in: path
          name: action_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Execution result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecuteComputerUseActionResponse"
  /api/computer-use/sessions/{session_id}/evidence:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    get:
      operationId: readComputerUseEvidence
      summary: Read computer-use evidence timeline
      parameters:
        - in: path
          name: session_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Computer-use evidence snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComputerUseEvidenceResponse"
  /api/embeddings/batch:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    post:
      operationId: createBatchEmbeddings
      summary: Create Gemini embedding vectors for a batch of texts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmbeddingBatchRequest"
      responses:
        "200":
          description: Batch embedding vectors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingBatchResponse"
  /api/sessions:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    get:
      operationId: listSessions
      summary: List sessions
      responses:
        "200":
          description: Session list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionListResponse"
  /api/sessions/start:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    post:
      operationId: startSession
      summary: Start session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionStartRequest"
      responses:
        "200":
          description: Started session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionRecord"
  /api/sessions/{session_id}/finish:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    post:
      operationId: finishSession
      summary: Finish session
      parameters:
        - in: path
          name: session_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Finished session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionRecord"
  /api/flows:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    get:
      operationId: listFlows
      summary: List flows
      responses:
        "200":
          description: Flow list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlowListResponse"
    post:
      operationId: createFlow
      summary: Create flow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FlowCreateRequest"
      responses:
        "200":
          description: Created flow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlowRecord"
  /api/flows/import-latest:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    post:
      operationId: importLatestFlow
      summary: Import latest flow draft
      responses:
        "200":
          description: Imported flow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlowRecord"
  /api/flows/{flow_id}:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    get:
      operationId: getFlow
      summary: Get flow by id
      parameters:
        - in: path
          name: flow_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Flow detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlowRecord"
    patch:
      operationId: patchFlow
      summary: Update flow
      parameters:
        - in: path
          name: flow_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FlowUpdateRequest"
      responses:
        "200":
          description: Updated flow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlowRecord"
  /api/templates:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    get:
      operationId: listTemplates
      summary: List templates
      responses:
        "200":
          description: Template list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateListResponse"
    post:
      operationId: createTemplate
      summary: Create template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TemplateCreateRequest"
      responses:
        "200":
          description: Created template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateRecord"
  /api/templates/import:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    post:
      operationId: importTemplate
      summary: Import a scrubbed template payload into the current checkout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TemplateImportRequest"
      responses:
        "200":
          description: Imported template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateRecord"
  /api/templates/from-artifacts:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    post:
      operationId: postTemplatesFromArtifacts
      summary: Create template from artifacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrchestrateFromArtifactsRequest"
      responses:
        "200":
          description: Created template from artifacts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrchestrateFromArtifactsResponse"
  /api/templates/{template_id}:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    get:
      operationId: getTemplate
      summary: Get template by id
      parameters:
        - in: path
          name: template_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Template detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateRecord"
    patch:
      operationId: patchTemplate
      summary: Update template
      parameters:
        - in: path
          name: template_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TemplateUpdateRequest"
      responses:
        "200":
          description: Updated template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateRecord"
  /api/templates/{template_id}/export:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    get:
      operationId: exportTemplate
      summary: Export template
      parameters:
        - in: path
          name: template_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Exported template payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateExportResponse"
  /api/templates/{template_id}/readiness:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    get:
      operationId: getTemplateReadiness
      summary: Get template readiness and selector health
      parameters:
        - in: path
          name: template_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Template readiness
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateReadiness"
  /api/profiles/resolve:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    post:
      operationId: resolveProfile
      summary: Resolve target profile from artifacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileResolveRequest"
      responses:
        "200":
          description: Resolved profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResolveResponse"
  /api/profiles/studio:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    get:
      operationId: getProfileTargetStudio
      summary: Load guarded profile and target studio documents
      parameters:
        - in: query
          name: profile_name
          required: false
          schema:
            type: string
        - in: query
          name: target_name
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Profile/target studio payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileTargetStudioResponse"
  /api/profiles/studio/profiles/{profile_name}:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    patch:
      operationId: updateProfileStudio
      summary: Save allowlisted profile studio changes
      parameters:
        - in: path
          name: profile_name
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigStudioSaveRequest"
      responses:
        "200":
          description: Saved profile studio payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigStudioSaveResponse"
  /api/profiles/studio/targets/{target_name}:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    patch:
      operationId: updateTargetStudio
      summary: Save allowlisted target studio changes
      parameters:
        - in: path
          name: target_name
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigStudioSaveRequest"
      responses:
        "200":
          description: Saved target studio payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigStudioSaveResponse"
  /api/reconstruction/preview:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    post:
      operationId: previewReconstruction
      summary: Create reconstruction preview
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReconstructionPreviewRequest"
      responses:
        "200":
          description: Reconstruction preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReconstructionPreviewResponse"
  /api/reconstruction/generate:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    post:
      operationId: generateReconstruction
      summary: Generate flow/template from reconstruction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReconstructionGenerateRequest"
      responses:
        "200":
          description: Reconstruction generation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReconstructionGenerateResponse"
  /api/runs:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    get:
      operationId: listRuns
      summary: List platform runs
      responses:
        "200":
          description: Run list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunListResponse"
    post:
      operationId: createRun
      summary: Create run from template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunCreateRequest"
      responses:
        "200":
          description: Created run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunResponse"
  /api/runs/{run_id}:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    get:
      operationId: getRun
      summary: Get run by id
      parameters:
        - in: path
          name: run_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Run detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunResponse"
  /api/runs/{run_id}/otp:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    post:
      operationId: submitRunOtp
      summary: Resume run from manual gate
      description: |
        Reuses the same resume endpoint for both wait states:
        - `waiting_otp`: `otp_code` should be provided.
        - `waiting_user`: manual gate for protected payment providers or other protection challenges; `otp_code` may be omitted when no OTP value is required.
      parameters:
        - in: path
          name: run_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunOtpSubmitRequest"
      responses:
        "200":
          description: Updated run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunResponse"
  /api/runs/{run_id}/recover-plan:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    get:
      operationId: getRunRecoveryPlan
      summary: Get guided recovery plan for a run
      parameters:
        - in: path
          name: run_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Recovery plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunRecoveryPlanResponse"
  /api/runs/{run_id}/cancel:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    post:
      operationId: cancelRun
      summary: Cancel run
      parameters:
        - in: path
          name: run_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cancelled run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunCancelResponse"
  /api/evidence-runs:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    get:
      operationId: listEvidenceRuns
      summary: List canonical evidence runs
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: Evidence run list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceRunListResponse"
  /api/evidence-runs/latest:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    get:
      operationId: getLatestEvidenceRun
      summary: Get latest canonical evidence run
      responses:
        "200":
          description: Latest evidence run detail or empty state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceRunLatestResponse"
  /api/evidence-runs/{run_id}:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    get:
      operationId: getEvidenceRun
      summary: Get canonical evidence run by id
      parameters:
        - in: path
          name: run_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Evidence run detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceRunResponse"
  /api/evidence-runs/{run_id}/compare/{candidate_run_id}:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    get:
      operationId: compareEvidenceRuns
      summary: Compare two canonical evidence runs
      parameters:
        - in: path
          name: run_id
          required: true
          schema:
            type: string
        - in: path
          name: candidate_run_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Evidence run compare payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceRunCompareResponse"
  /api/evidence-runs/{run_id}/share-pack:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    get:
      operationId: getEvidenceSharePack
      summary: Export an evidence share pack
      parameters:
        - in: path
          name: run_id
          required: true
          schema:
            type: string
        - in: query
          name: candidate_run_id
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Evidence share pack
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceSharePackResponse"
  /api/evidence-runs/{run_id}/explain:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    get:
      operationId: explainEvidenceRunFailure
      summary: Explain a failed evidence run with advisory-only guidance
      parameters:
        - in: path
          name: run_id
          required: true
          schema:
            type: string
        - in: query
          name: candidate_run_id
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Failure explanation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FailureExplanationResponse"
  /api/evidence-runs/{run_id}/promotion-candidate:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    get:
      operationId: getPromotionCandidate
      summary: Get promotion eligibility for a canonical evidence run
      parameters:
        - in: path
          name: run_id
          required: true
          schema:
            type: string
        - in: query
          name: candidate_run_id
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Promotion candidate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromotionCandidateResponse"
  /api/evidence-runs/{run_id}/review-workspace:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    get:
      operationId: getHostedReviewWorkspace
      summary: Build a local-first review workspace packet for a retained run
      parameters:
        - in: path
          name: run_id
          required: true
          schema:
            type: string
        - in: query
          name: candidate_run_id
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Hosted review workspace seed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostedReviewWorkspaceResponse"
  /api/integrations/vonage/inbound-sms:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    get:
      operationId: getVonageInboundSms
      summary: Receive inbound Vonage SMS callback
      description: "Use header x-vonage-inbound-token. Query token fallback is disabled by default and must be explicitly enabled. Signature verification uses VONAGE_SIGNATURE_ALGO=sha256."
      responses:
        "200":
          description: Inbound callback accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VonageInboundResponse"
    post:
      operationId: postVonageInboundSms
      summary: Receive inbound Vonage SMS callback (POST)
      description: "Use header x-vonage-inbound-token. Query token fallback is disabled by default and must be explicitly enabled. Signature verification uses VONAGE_SIGNATURE_ALGO=sha256."
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Inbound callback accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VonageInboundResponse"
  /api/command-tower/overview:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    get:
      operationId: getCommandTowerOverview
      summary: Get command-tower overview
      responses:
        "200":
          description: Diagnostics, alerts and latest flow preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandTowerOverviewResponse"
  /api/command-tower/latest-flow:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    get:
      operationId: getCommandTowerLatestFlow
      summary: Get latest flow preview
      parameters:
        - $ref: "#/components/parameters/SessionIdQueryCommandTower"
      responses:
        "200":
          description: Latest flow preview for the resolved session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlowPreviewResponse"
  /api/command-tower/latest-flow-draft:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    get:
      operationId: getCommandTowerLatestFlowDraft
      summary: Get latest flow draft document
      parameters:
        - $ref: "#/components/parameters/SessionIdQueryCommandTower"
      responses:
        "200":
          description: Latest flow draft payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlowDraftDocumentResponse"
    patch:
      operationId: patchCommandTowerLatestFlowDraft
      summary: Update latest flow draft document
      parameters:
        - $ref: "#/components/parameters/SessionIdQueryCommandTower"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FlowDraftDocumentUpdateRequest"
      responses:
        "200":
          description: Updated flow draft payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlowDraftDocumentResponse"
  /api/command-tower/replay-latest:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    post:
      operationId: postCommandTowerReplayLatest
      summary: Trigger replay for latest flow draft
      parameters:
        - $ref: "#/components/parameters/SessionIdQueryCommandTower"
      responses:
        "200":
          description: Created replay task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunCommandResponse"
  /api/command-tower/orchestrate-from-artifacts:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    post:
      operationId: postCommandTowerOrchestrateFromArtifacts
      summary: Create template (and optional run) from reconstruction artifacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrchestrateFromArtifactsRequest"
      responses:
        "200":
          description: Orchestration result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrchestrateFromArtifactsResponse"
  /api/command-tower/replay-latest-from-step:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    post:
      operationId: postCommandTowerReplayLatestFromStep
      summary: Trigger replay from a specific step
      parameters:
        - $ref: "#/components/parameters/SessionIdQueryCommandTower"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplayFromStepRequest"
      responses:
        "200":
          description: Created replay task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunCommandResponse"
  /api/command-tower/replay-latest-step:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    post:
      operationId: postCommandTowerReplayLatestStep
      summary: Trigger replay for a single step
      parameters:
        - $ref: "#/components/parameters/SessionIdQueryCommandTower"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplayLatestStepRequest"
      responses:
        "200":
          description: Created step replay task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunCommandResponse"
  /api/command-tower/evidence:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    get:
      operationId: getCommandTowerStepEvidence
      summary: Get evidence by step id
      parameters:
        - $ref: "#/components/parameters/StepIdQuery"
        - $ref: "#/components/parameters/SessionIdQueryCommandTower"
      responses:
        "200":
          description: Step evidence payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StepEvidenceResponse"
  /api/command-tower/evidence-timeline:
    parameters:
      - $ref: "#/components/parameters/XAutomationClientIdHeader"
    get:
      operationId: getCommandTowerEvidenceTimeline
      summary: Get evidence timeline
      parameters:
        - $ref: "#/components/parameters/SessionIdQueryCommandTower"
      responses:
        "200":
          description: Session evidence timeline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceTimelineResponse"
components:
  parameters:
    XAutomationClientIdHeader:
      in: header
      name: x-automation-client-id
      required: false
      schema:
        type: string
      description: Required when token auth is enabled and x-automation-token is present; used for audit trace alignment and requester ownership isolation.
    SessionIdQueryCommandTower:
      in: query
      name: session_id
      required: false
      schema:
        type: string
      description: |
        Optional explicit session selector for command-tower endpoints.
        - Omit to resolve to the latest session owned by current requester.
        - Provide non-empty session_id to pin a specific owned session.
        - Empty value returns 422.
        - Unknown/unowned session or missing session directory returns 404.
    StepIdQuery:
      in: query
      name: step_id
      required: true
      schema:
        type: string
      description: Target step id for evidence lookup.

  schemas:
    RootResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: service ready

    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok

    CsrfResponse:
      type: object
      required: [csrf_token]
      properties:
        csrf_token:
          type: string

    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    RegisterResponse:
      type: object
      required: [user_id, email]
      properties:
        user_id:
          type: string
        email:
          type: string

    SessionStartRequest:
      type: object
      required: [start_url]
      properties:
        start_url:
          type: string
        mode:
          type: string
          default: manual

    SessionRecord:
      type: object
      additionalProperties: true

    SessionListResponse:
      type: object
      required: [sessions]
      properties:
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/SessionRecord"

    CreateComputerUseSessionRequest:
      type: object
      required: [instruction]
      properties:
        instruction:
          type: string
        model:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true

    ComputerUseSessionResponse:
      type: object
      required: [session_id, model, instruction, created_at]
      properties:
        session_id:
          type: string
        model:
          type: string
        instruction:
          type: string
        created_at:
          type: string

    PreviewComputerUseActionRequest:
      type: object
      properties:
        screenshot_base64:
          type: string
          nullable: true
        screenshot_mime_type:
          type: string
        instruction:
          type: string
          nullable: true
        include_thoughts:
          type: boolean

    ConfirmComputerUseActionRequest:
      type: object
      properties:
        approved:
          type: boolean
        confirmation_reason:
          type: string
          nullable: true

    ComputerUseActionResponse:
      type: object
      required: [session_id, action_id, name, args, rationale, risk_level, action_digest, require_confirmation, safety_decision, status]
      properties:
        session_id:
          type: string
        action_id:
          type: string
        name:
          type: string
        args:
          type: object
          additionalProperties: true
        rationale:
          type: string
        risk_level:
          type: string
        confirmation_reason:
          type: string
          nullable: true
        action_digest:
          type: string
        require_confirmation:
          type: boolean
        safety_decision:
          type: string
        status:
          type: string
        confirmed_by:
          type: string
          nullable: true
        executed_at:
          type: string
          nullable: true

    ExecuteComputerUseActionResponse:
      type: object
      required: [session_id, action_id, status, executor, executed_at, executed_by, applied_args, evidence]
      properties:
        session_id:
          type: string
        action_id:
          type: string
        status:
          type: string
        executor:
          type: string
        executed_at:
          type: string
        executed_by:
          type: string
        applied_args:
          type: object
          additionalProperties: true
        risk_level:
          type: string
          nullable: true
        confirmation_reason:
          type: string
          nullable: true
        action_digest:
          type: string
          nullable: true
        evidence:
          type: object
          additionalProperties: true

    ComputerUseEvidenceResponse:
      type: object
      required: [session_id, event_count, events, evidence_path]
      properties:
        session_id:
          type: string
        event_count:
          type: integer
        events:
          type: array
          items:
            type: object
            additionalProperties: true
        evidence_path:
          type: string

    EmbeddingBatchRequest:
      type: object
      required: [texts]
      properties:
        texts:
          type: array
          items:
            type: string
        model:
          type: string
          nullable: true

    EmbeddingBatchResponse:
      type: object
      required: [model, vector_count, dimension, vectors]
      properties:
        model:
          type: string
        vector_count:
          type: integer
        dimension:
          type: integer
        vectors:
          type: array
          items:
            type: array
            items:
              type: number

    FlowRecord:
      type: object
      additionalProperties: true

    FlowListResponse:
      type: object
      required: [flows]
      properties:
        flows:
          type: array
          items:
            $ref: "#/components/schemas/FlowRecord"

    FlowCreateRequest:
      type: object
      required: [session_id, start_url]
      properties:
        session_id:
          type: string
        start_url:
          type: string
        source_event_count:
          type: integer
          default: 0
        steps:
          type: array
          items:
            type: object
            additionalProperties: true

    FlowUpdateRequest:
      type: object
      properties:
        start_url:
          type: string
        steps:
          type: array
          items:
            type: object
            additionalProperties: true

    TemplateRecord:
      type: object
      additionalProperties: true

    TemplateListResponse:
      type: object
      required: [templates]
      properties:
        templates:
          type: array
          items:
            $ref: "#/components/schemas/TemplateRecord"

    TemplateCreateRequest:
      type: object
      required: [flow_id, name]
      properties:
        flow_id:
          type: string
        name:
          type: string
        params_schema:
          type: array
          items:
            type: object
            additionalProperties: true
        defaults:
          type: object
          additionalProperties: true
        policies:
          type: object
          additionalProperties: true

    TemplateUpdateRequest:
      type: object
      properties:
        name:
          type: string
        params_schema:
          type: array
          items:
            type: object
            additionalProperties: true
        defaults:
          type: object
          additionalProperties: true
        policies:
          type: object
          additionalProperties: true

    TemplateImportRequest:
      type: object
      required: [template]
      properties:
        template:
          type: object
          additionalProperties: true
        name:
          type: string

    TemplateExportResponse:
      type: object
      additionalProperties: true

    TemplateReadinessStep:
      type: object
      required: [step_id, reasons, confidence, selector_score]
      properties:
        step_id:
          type: string
        reasons:
          type: array
          items:
            type: string
        confidence:
          type: number
          nullable: true
        selector_score:
          type: integer
          nullable: true

    TemplateReadiness:
      type: object
      required:
        [template_id, flow_id, readiness_score, risk_level, step_count, average_confidence, selector_risk_count, manual_gate_density, low_confidence_steps, selectorless_steps, high_risk_steps]
      properties:
        template_id:
          type: string
        flow_id:
          type: string
        readiness_score:
          type: integer
        risk_level:
          type: string
          enum: [low, medium, high]
        step_count:
          type: integer
        average_confidence:
          type: number
        selector_risk_count:
          type: integer
        manual_gate_density:
          type: number
        low_confidence_steps:
          type: array
          items:
            type: string
        selectorless_steps:
          type: array
          items:
            type: string
        high_risk_steps:
          type: array
          items:
            $ref: "#/components/schemas/TemplateReadinessStep"

    ProfileResolveRequest:
      type: object
      additionalProperties: true

    ProfileResolveResponse:
      type: object
      additionalProperties: true

    ProfileTargetStudioResponse:
      type: object
      additionalProperties: true

    ConfigStudioSaveRequest:
      type: object
      additionalProperties: true

    ConfigStudioSaveResponse:
      type: object
      additionalProperties: true

    ReconstructionPreviewRequest:
      type: object
      additionalProperties: true

    ReconstructionPreviewResponse:
      type: object
      additionalProperties: true

    ReconstructionGenerateRequest:
      type: object
      additionalProperties: true

    ReconstructionGenerateResponse:
      type: object
      additionalProperties: true

    OrchestrateFromArtifactsRequest:
      type: object
      additionalProperties: true

    OrchestrateFromArtifactsResponse:
      type: object
      additionalProperties: true

    DiagnosticsResponse:
      type: object
      required: [status, uptime_seconds, storage_backend, task_counts, task_total, metrics]
      properties:
        status:
          type: string
          example: ok
        uptime_seconds:
          type: integer
        storage_backend:
          type: string
          example: file
        task_counts:
          type: object
          required: [queued, running, success, failed, cancelled]
          properties:
            queued:
              type: integer
            running:
              type: integer
            success:
              type: integer
            failed:
              type: integer
            cancelled:
              type: integer
        task_total:
          type: integer
        metrics:
          type: object
          additionalProperties: true

    AlertsResponse:
      type: object
      required: [state, failure_rate, threshold, completed, failed]
      properties:
        state:
          type: string
          enum: [ok, degraded]
        failure_rate:
          type: number
        threshold:
          type: number
        completed:
          type: integer
        failed:
          type: integer

    RumMetricIngestRequest:
      type: object
      required: [metric, value]
      properties:
        metric:
          type: string
          description: Metric name, usually one of LCP/CLS/INP/FCP/TTFB.
        value:
          type: number
        rating:
          type: string
          nullable: true
        path:
          type: string
          nullable: true
        navigationType:
          type: string
          nullable: true
        timestampMs:
          type: number
          nullable: true

    RumMetricIngestResponse:
      type: object
      required: [status, metric, samples_total]
      properties:
        status:
          type: string
          example: accepted
        metric:
          type: string
        samples_total:
          type: integer

    DiagnosticsIndex:
      type: object
      required: [capture, explore, chaos, report]
      properties:
        capture:
          type: object
          additionalProperties: true
        explore:
          type: object
          additionalProperties: true
        chaos:
          type: object
          additionalProperties: true
        report:
          $ref: "#/components/schemas/ReportSummary"

    AlertItem:
      type: object
      required: [code, severity, message]
      properties:
        code:
          type: string
        severity:
          type: string
          enum: [info, warning, critical]
        message:
          type: string

    AutomationCommandListResponse:
      type: object
      required: [commands]
      properties:
        commands:
          type: array
          items:
            $ref: "#/components/schemas/AutomationCommand"

    AutomationCommand:
      type: object
      required: [command_id, title, description, tags, accepts_env]
      properties:
        command_id:
          type: string
        title:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        accepts_env:
          type: boolean

    AutomationTaskListResponse:
      type: object
      required: [tasks]
      properties:
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/AutomationTask"

    AutomationTaskResponse:
      type: object
      required: [task]
      properties:
        task:
          $ref: "#/components/schemas/AutomationTask"

    AutomationRunRequest:
      type: object
      required: [command]
      properties:
        command:
          type: string
        params:
          type: object
          additionalProperties:
            type: string
          description: Prefer this field instead of `env`.
        env:
          type: object
          additionalProperties:
            type: string
          deprecated: true

    AutomationRunResponse:
      type: object
      required: [task]
      properties:
        task:
          $ref: "#/components/schemas/AutomationTask"

    AutomationTask:
      type: object
      required: [task_id, command, command_id, status, attempt, max_attempts, created_at, updated_at, output_tail]
      properties:
        task_id:
          type: string
        command:
          type: string
        command_id:
          type: string
          nullable: true
        status:
          type: string
          enum: [queued, running, success, failed, cancelled]
        requested_by:
          type: string
          nullable: true
        attempt:
          type: integer
        max_attempts:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
          nullable: true
        finished_at:
          type: string
          format: date-time
          nullable: true
        exit_code:
          type: integer
          nullable: true
        message:
          type: string
          nullable: true
        output_tail:
          type: string
        idempotency_key:
          type: string
          nullable: true
        replay_of_task_id:
          type: string
          nullable: true
        correlation_id:
          type: string
          nullable: true
        linked_run_id:
          type: string
          nullable: true

    RunCreateRequest:
      type: object
      required: [template_id]
      properties:
        template_id:
          type: string
        session_id:
          type: string
          description: Optional session id to bind the run lifecycle to an existing session context.
        params:
          type: object
          additionalProperties: true
        otp_code:
          type: string

    RunOtpSubmitRequest:
      type: object
      description: |
        Resume payload for both manual wait states.
        - `waiting_otp`: provide `otp_code`.
        - `waiting_user`: `otp_code` is optional and only needed when the gate asks for OTP-like supplemental input.
      properties:
        otp_code:
          type: string
          nullable: true
          description: Optional resume input. Required for `waiting_otp`; optional for `waiting_user`.

    RunListResponse:
      type: object
      required: [runs]
      properties:
        runs:
          type: array
          items:
            $ref: "#/components/schemas/Run"

    RunResponse:
      type: object
      required: [run]
      properties:
        run:
          $ref: "#/components/schemas/Run"

    RunRecoveryAction:
      type: object
      required: [action_id, label, description, kind, requires_input, safety_level]
      properties:
        action_id:
          type: string
        label:
          type: string
        description:
          type: string
        kind:
          type: string
          enum: [resume, replay, inspect, navigate]
        step_id:
          type: string
          nullable: true
        requires_input:
          type: boolean
        input_label:
          type: string
          nullable: true
        safety_level:
          type: string
          enum: [safe_suggestion, confirm_before_apply, manual_only]
        safety_reason:
          type: string
          nullable: true

    RunRecoveryPlan:
      type: object
      required:
        [run_id, status, headline, summary, primary_action, actions, suggested_step_id, linked_task_id, correlation_id]
      properties:
        run_id:
          type: string
        status:
          type: string
        headline:
          type: string
        summary:
          type: string
        reason_code:
          type: string
          nullable: true
        primary_action:
          allOf:
            - $ref: "#/components/schemas/RunRecoveryAction"
          nullable: true
        actions:
          type: array
          items:
            $ref: "#/components/schemas/RunRecoveryAction"
        suggested_step_id:
          type: string
          nullable: true
        linked_task_id:
          type: string
          nullable: true
        correlation_id:
          type: string
          nullable: true

    RunRecoveryPlanResponse:
      type: object
      required: [plan]
      properties:
        plan:
          $ref: "#/components/schemas/RunRecoveryPlan"

    RunCancelResponse:
      type: object
      required: [run]
      properties:
        run:
          $ref: "#/components/schemas/Run"

    Run:
      type: object
      required: [run_id, status, created_at, updated_at, step_cursor, params, artifacts_ref, logs]
      properties:
        run_id:
          type: string
        template_id:
          type: string
          nullable: true
        session_id:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/RunStatus"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        step_cursor:
          type: integer
        params:
          type: object
          additionalProperties:
            type: string
        task_id:
          type: string
          nullable: true
        last_error:
          type: string
          nullable: true
        artifacts_ref:
          type: object
          additionalProperties:
            type: string
        logs:
          type: array
          items:
            $ref: "#/components/schemas/RunLogEntry"
        correlation_id:
          type: string
          nullable: true
        linked_evidence_run_ids:
          type: array
          items:
            type: string
        reason_code:
          type: string
          nullable: true
        wait_context:
          $ref: "#/components/schemas/RunWaitContext"
        report:
          $ref: "#/components/schemas/ReportSummary"

    RunLogEntry:
      type: object
      required: [ts, level, message]
      properties:
        ts:
          type: string
          format: date-time
        level:
          type: string
          enum: [info, warn, error]
        message:
          type: string

    RunStatus:
      type: string
      description: |
        `waiting_otp` means the run is paused for OTP/3DS input.
        `waiting_user` means a manual gate is triggered (for example protected payment providers or anti-bot challenges) and user action is required before resume.
      enum: [queued, running, waiting_user, waiting_otp, success, failed, cancelled]

    RunWaitContext:
      type: object
      description: Optional context attached when run status is `waiting_otp` or `waiting_user`.
      properties:
        reason_code:
          type: string
          nullable: true
          description: Machine-readable reason for the wait state (for example `provider_protected_payment_step`).
        at_step_id:
          type: string
          nullable: true
          description: Step id where the wait state is detected.
        after_step_id:
          type: string
          nullable: true
          description: Last completed step id before pausing.
        resume_from_step_id:
          type: string
          nullable: true
          description: Step id used by resume flow when continuing execution.
        resume_hint:
          type: string
          nullable: true
          description: Human-readable hint for operators.
        provider_domain:
          type: string
          nullable: true
          description: Provider domain hint when available (for example `stripe.com`).
        gate_required_by_policy:
          type: boolean
          nullable: true
          description: Whether the wait state is triggered by explicit gate policy.

    EvidenceRegistryState:
      type: string
      enum: [available, empty, missing]

    EvidenceRetentionState:
      type: string
      enum: [retained, partial, missing, empty]

    EvidenceRunProvenance:
      type: object
      required: [source, correlation_id, linked_run_ids, linked_task_ids]
      properties:
        source:
          type: string
          nullable: true
          enum: [canonical, automation, operator, null]
        correlation_id:
          type: string
          nullable: true
        linked_run_ids:
          type: array
          items:
            type: string
        linked_task_ids:
          type: array
          items:
            type: string

    EvidenceRunSummary:
      type: object
      required:
        [
          run_id,
          profile,
          target_name,
          target_type,
          gate_status,
          retention_state,
          started_at,
          finished_at,
          duration_ms,
          manifest_path,
          summary_path,
          missing_paths,
          provenance
        ]
      properties:
        run_id:
          type: string
        profile:
          type: string
          nullable: true
        target_name:
          type: string
          nullable: true
        target_type:
          type: string
          nullable: true
        gate_status:
          type: string
          nullable: true
        retention_state:
          $ref: "#/components/schemas/EvidenceRetentionState"
        started_at:
          type: string
          nullable: true
        finished_at:
          type: string
          nullable: true
        duration_ms:
          type: integer
          nullable: true
        manifest_path:
          type: string
          nullable: true
        summary_path:
          type: string
          nullable: true
        missing_paths:
          type: array
          items:
            type: string
        provenance:
          $ref: "#/components/schemas/EvidenceRunProvenance"

    EvidenceRun:
      allOf:
        - $ref: "#/components/schemas/EvidenceRunSummary"
        - type: object
          required:
            [
              available_paths,
              reports,
              proof_paths,
              evidence_index_count,
              state_count,
              registry_state
            ]
          properties:
            available_paths:
              type: array
              items:
                type: string
            reports:
              type: object
              additionalProperties:
                type: string
            proof_paths:
              type: object
              additionalProperties:
                type: string
            evidence_index_count:
              type: integer
            state_count:
              type: integer
            registry_state:
              $ref: "#/components/schemas/EvidenceRegistryState"
            parse_error:
              type: string
              nullable: true

